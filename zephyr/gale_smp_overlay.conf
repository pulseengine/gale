# SMP overlay for Gale — enables SMP-dependent modules.
#
# Use on top of gale_overlay.conf for SMP-capable boards:
#   -DOVERLAY_CONFIG="gale_overlay.conf;gale_smp_overlay.conf"
#
# Requires CONFIG_SMP=y (set by the board defconfig, e.g. qemu_x86_64).
CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=2
# Bisect step 2: ALL three shims disabled.
#
# Step 1 (PR #38) showed CONFIG_GALE_KERNEL_SPINLOCK_VALIDATE=n alone
# fixes smp_semaphore (qemu_x86_64, SMP) but leaves smp_mutex and
# smp_threads still hanging at AP startup. So at least one of
# {CPU_MASK, IPI} is also implicated.
#
# This step collapses both — if smp_mutex and smp_threads both go green
# here, the second culprit is somewhere in {CPU_MASK, IPI}. A follow-up
# step then re-enables one at a time to localize.
#
# If still red here, the AP-hang has a fourth source we haven't named
# (e.g. compiler-generated code in another module, gale_overlay.conf
# itself, or x86 boot path beyond Gale entirely).
CONFIG_GALE_KERNEL_SPINLOCK_VALIDATE=n
CONFIG_GALE_KERNEL_CPU_MASK=n
CONFIG_GALE_KERNEL_IPI=n
