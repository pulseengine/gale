# SMP overlay for Gale — enables SMP-dependent modules.
#
# Use on top of gale_overlay.conf for SMP-capable boards:
#   -DOVERLAY_CONFIG="gale_overlay.conf;gale_smp_overlay.conf"
#
# Requires CONFIG_SMP=y (set by the board defconfig, e.g. qemu_x86_64).
CONFIG_SMP=y
CONFIG_MP_MAX_NUM_CPUS=2
# Bisect step 1: spinlock-validate disabled to test whether the AP-startup
# hang on qemu_x86_64 SMP comes from the validation hooks on every spinlock
# acquire/release. If this run goes green, spinlock-validate is the culprit.
# If still red, next bisect step disables CPU_MASK; then IPI.
CONFIG_GALE_KERNEL_SPINLOCK_VALIDATE=n
CONFIG_GALE_KERNEL_CPU_MASK=y
CONFIG_GALE_KERNEL_IPI=y
