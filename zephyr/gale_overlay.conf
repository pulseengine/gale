# All 27 kernel API modules enabled.
# Modules with CONFIG guards compile as empty when their feature is off.
# Modules marked "helpers only" provide decision functions but don't
# fully replace the Zephyr C source (the fork guard is not activated).
CONFIG_GALE_KERNEL_SEM=y
CONFIG_GALE_KERNEL_MUTEX=y
CONFIG_GALE_KERNEL_CONDVAR=y
CONFIG_GALE_KERNEL_MSGQ=y
CONFIG_GALE_KERNEL_STACK=y
CONFIG_GALE_KERNEL_PIPE=y
CONFIG_GALE_KERNEL_EVENT=y
CONFIG_GALE_KERNEL_TIMER=y
CONFIG_GALE_KERNEL_MEM_SLAB=y
CONFIG_GALE_KERNEL_FIFO=y
CONFIG_GALE_KERNEL_LIFO=y
CONFIG_GALE_KERNEL_QUEUE=y
CONFIG_GALE_KERNEL_MBOX=y
CONFIG_GALE_KERNEL_TIMEOUT=y
CONFIG_GALE_KERNEL_POLL=y
CONFIG_GALE_KERNEL_FUTEX=y
CONFIG_GALE_KERNEL_TIMESLICE=y
CONFIG_GALE_KERNEL_KHEAP=y
CONFIG_GALE_KERNEL_WORK=y
CONFIG_GALE_KERNEL_FATAL=y
CONFIG_GALE_KERNEL_MEMPOOL=y
CONFIG_GALE_KERNEL_DYNAMIC=y
CONFIG_GALE_KERNEL_SMP_STATE=y
CONFIG_GALE_KERNEL_SCHED=y
# mem_domain and userspace only active when CONFIG_USERSPACE=y (Kconfig depends on it)
CONFIG_GALE_KERNEL_MEM_DOMAIN=y
CONFIG_GALE_KERNEL_USERSPACE=y
# thread_lifecycle disabled: thread.c exports _thread_dummy and other
# symbols called by init.c that the Gale shim doesn't provide.
CONFIG_GALE_KERNEL_THREAD_LIFECYCLE=y
# sys_heap: DISABLED — requires patching lib/heap/CMakeLists.txt in the
# Zephyr fork to guard heap.c with CONFIG_GALE_KERNEL_HEAP.
# Without the fork patch, gale_heap.c and upstream heap.c both define
# sys_heap_alloc/free/realloc, causing multiple-definition link errors.
# Enable after adding to the fork:
#   if(NOT CONFIG_GALE_KERNEL_HEAP)
#     zephyr_sources(heap.c)
#   endif()
# CONFIG_GALE_KERNEL_HEAP=y
