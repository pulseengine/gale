# Gale profiling overlay — enables thread/stack analysis.
#
# Use alongside gale_overlay.conf to gather runtime performance data:
#
#   west build -b qemu_cortex_m3 -s zephyr/tests/kernel/semaphore/semaphore \
#     -- -DZEPHYR_EXTRA_MODULES=/path/to/gale \
#        -DOVERLAY_CONFIG="/path/to/gale/zephyr/gale_overlay.conf;/path/to/gale/zephyr/gale_profiling_overlay.conf"

# --- Thread stack analysis ---
# Reports per-thread stack high-water marks (paint-fill method).
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=5
CONFIG_THREAD_ANALYZER_USE_PRINTK=y
CONFIG_INIT_STACKS=y

# --- Thread runtime statistics ---
# Collects per-thread CPU cycle counts at context switch.
CONFIG_SCHED_THREAD_USAGE=y
CONFIG_SCHED_THREAD_USAGE_ANALYSIS=y
CONFIG_SCHED_THREAD_USAGE_ALL=y

# --- Stack canaries ---
# Places canary values at stack frame boundaries for overflow detection.
CONFIG_STACK_CANARIES=y
