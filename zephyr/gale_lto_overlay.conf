# LLVM cross-language LTO overlay for Gale.
#
# Use with ZEPHYR_TOOLCHAIN_VARIANT=llvm to enable link-time optimization
# across C (Zephyr) and Rust (Gale) code boundaries.
#
# This allows the LLVM linker to inline Rust FFI functions directly into
# their C call sites, achieving zero overhead for formally verified code.
#
# Prerequisites:
#   - LLVM/Clang toolchain with ARM bare-metal support
#   - lld linker (bundled with LLVM)
#   - Rust toolchain producing LLVM bitcode (-C linker-plugin-lto)
#
# Usage:
#   west build -b qemu_cortex_m3 -s zephyr/tests/kernel/semaphore/semaphore \
#     -- -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
#        -DZEPHYR_EXTRA_MODULES=/path/to/gale \
#        -DOVERLAY_CONFIG="/path/to/gale/zephyr/gale_overlay.conf;/path/to/gale/zephyr/gale_lto_overlay.conf"

# Enable link-time optimization (requires ISR_TABLES_LOCAL_DECLARATION
# on platforms using GEN_ISR_TABLES).
CONFIG_LTO=y

# Use LLVM's lld linker (required for cross-language LTO with clang).
CONFIG_LLVM_USE_LLD=y

# Use ISR tables local declaration to satisfy LTO dependency.
CONFIG_ISR_TABLES_LOCAL_DECLARATION=y
