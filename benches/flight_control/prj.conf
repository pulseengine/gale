# Flight-control macro-benchmark — base config.
#
# Same shape as engine_control's prj.conf with adds for the new
# primitives the macro bench exercises (mutex, msgq, condvar).
# Keeps CONFIG_GALE_KERNEL_* off by default; apply prj-gale.conf
# on the second build to swap in Gale primitives.

CONFIG_STDOUT_CONSOLE=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=2048

# The five primitives composing the bench.
CONFIG_RING_BUFFER=y
CONFIG_EVENTS=y

# Tick rate: 100 kHz so k_timer can express 1 kHz and 100 Hz periods
# without granularity loss. Same value engine_control uses.
CONFIG_SYS_CLOCK_TICKS_PER_SEC=100000

# Cycle counter accuracy is load-bearing for the four cycle deltas.
CONFIG_TIMING_FUNCTIONS=y

# No logging noise on the hot path. CSV emitted from reader thread.
CONFIG_LOG=n
CONFIG_CBPRINTF_NANO=y

# Mutex priority inheritance is on by default for K_MUTEX_DEFINE; the
# design depends on it (telemetry @ prio 9 must not starve when fusion
# @ prio 4 holds the state mutex while actuators run at 6/7/8).
# No explicit Kconfig — it's a kernel default.
