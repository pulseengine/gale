# Flight-control macro-benchmark — Gale overlay.
#
# Applied on top of prj.conf to swap Gale's verified primitives into
# the entire control loop. The macro bench's whole point is that the
# slowdown from any single primitive may be invisible until they
# interact — so this overlay turns ALL FIVE on simultaneously.
#
# Variant matrix (from design doc Section 7):
#   baseline           — stock Zephyr (this overlay NOT applied)
#   gale-rustc         — this overlay
#   baseline-via-synth — synth-built C
#   gale-via-synth     — this overlay + -DGALE_USE_SYNTH=ON
#
# Usage:
#   west build -b qemu_cortex_m3 -s benches/flight_control \
#     -d /tmp/flight-gale \
#     -- -DZEPHYR_EXTRA_MODULES=<abs-path-to-gale> \
#        -DOVERLAY_CONFIG=benches/flight_control/prj-gale.conf

# Always-on (parity with engine_control's prj-gale.conf).
CONFIG_GALE_KERNEL_SEM=y
CONFIG_GALE_KERNEL_TIMER=y
CONFIG_GALE_KERNEL_SPINLOCK=y

# New for the macro bench.
CONFIG_GALE_KERNEL_MUTEX=y
CONFIG_GALE_KERNEL_MSGQ=y
CONFIG_GALE_KERNEL_CONDVAR=y
