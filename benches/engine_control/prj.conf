# Engine-control benchmark — base config.
#
# Keeps CONFIG_GALE_KERNEL_* off by default. Apply gale_overlay.conf
# on the second build to swap Gale primitives in.

CONFIG_STDOUT_CONSOLE=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=2048

# Enable the primitives the benchmark exercises in the ISR / thread path.
CONFIG_EVENTS=y
CONFIG_RING_BUFFER=y

# Pump tick rate up so k_timer can approximate 10 μs periods
# (default is 10 ms / 100 Hz, way too coarse for 60 kHz targets).
# 100 kHz tick = 10 μs granularity, enough to hit ~3 kHz crank rate.
# Past that we need the counter subsystem — wire that in on iteration 2.
CONFIG_SYS_CLOCK_TICKS_PER_SEC=100000

# Cycle counter: must be accurate for latency measurement.
CONFIG_TIMING_FUNCTIONS=y

# No logging noise from the hot path. The benchmark writes CSV to
# console only from the main thread at end-of-run.
CONFIG_LOG=n
CONFIG_CBPRINTF_NANO=y
