# NUCLEO-G474RE — alternate kernel-tick source: STM32 LPTIM
#
# Layered onto the bench prj.conf when capture.sh is invoked with
# `--tick-source lptim`. Compared against the SysTick variant
# (the Cortex-M default) to determine whether the silicon-anchor
# multiplier is sensitive to tick-source choice.
#
# CAVEAT — clock source.
#   Zephyr's default LPTIM clock is LSE (32.768 kHz). The engine_control
#   bench sets CONFIG_SYS_CLOCK_TICKS_PER_SEC=100000 (10 µs granularity),
#   which exceeds what LSE-clocked LPTIM can sustain. To run the bench's
#   100 kHz tick rate on LPTIM, layer a device-tree overlay that switches
#   LPTIM1 to PCLK1 (170 MHz / prescaler). A starter overlay lives next
#   to this file at `tick-lptim.overlay` (pending DT verification on G4
#   bindings — see board README).
#
#   If the DT overlay isn't applied, this build will use LSE-clocked
#   LPTIM and Zephyr's tick-rate negotiation will silently cap the tick
#   rate; the captured run will NOT be apples-to-apples with the SysTick
#   variant. Manifest field `tick_source: lptim` makes that visible.

CONFIG_CORTEX_M_SYSTICK=n
CONFIG_STM32_LPTIM_TIMER=y
