# LTO Kconfig overlay tuned for nucleo_g474re silicon-anchor builds.
#
# The upstream zephyr/gale_lto_overlay.conf includes
# CONFIG_ISR_TABLES_LOCAL_DECLARATION=y, which empirically prevents the
# LLVM linker plugin from registering the ADC1_2 IRQ-18 vector handler
# during whole-program LTO link on STM32G4 silicon. The chip then takes
# a spurious IRQ 18 during boot and halts in arch_system_halt
# (see silicon/boards/nucleo_g474re/NOTES-llvm-lto-crash.md).
#
# This overlay enables the same LTO settings WITHOUT the LOCAL_DECLARATION
# bit, restoring the conventional Zephyr ISR-table layout that the LLVM
# linker plugin handles correctly.

CONFIG_LTO=y
CONFIG_LLVM_USE_LLD=y
