# Engine-control benchmark — CTF tracing overlay.
#
# Overlays on top of prj.conf (and optionally prj-gale.conf) to enable
# Zephyr's Common Trace Format tracing subsystem. CTF packets are emitted
# for every kernel object operation already hooked by Gale's shims
# (k_sem_*, k_timer_*, thread switches, ISR entry/exit), so wiring this
# in doesn't require touching the bench source.
#
# Does NOT replace the poor-man's CSV event stream in src/main.c. The CSV
# goes to UART0 (console); CTF goes to UART1 (tracing-uart), captured by
# QEMU via a second `-serial` redirect to a file (see
# tracing_ctf/run-ctf.sh). Both streams are recorded in parallel.
#
# Usage:
#   west build -b qemu_cortex_m3 -s benches/engine_control \
#     -d /tmp/engine-ctf \
#     -- -DOVERLAY_CONFIG=benches/engine_control/prj-ctf.conf
#
# Combine with gale primitives (CTF + gale_sem + gale_timer paths):
#   -DOVERLAY_CONFIG="benches/engine_control/prj-gale.conf;benches/engine_control/prj-ctf.conf"

CONFIG_TRACING=y
CONFIG_TRACING_CTF=y
CONFIG_TRACING_BACKEND_UART=y
CONFIG_TRACING_ASYNC=y
CONFIG_TRACING_BUFFER_SIZE=4096

# CTF needs timestamps for event ordering + latency analysis.
CONFIG_TRACING_CTF_TIMESTAMP=y

# Async tracing spawns a worker thread at default prio; pin below the
# reader so we never preempt the measurement-critical emit_event path.
CONFIG_TRACING_THREAD_PRIORITY=6
CONFIG_TRACING_THREAD_STACK_SIZE=1024

# Thread names help correlate CTF events to bench threads (sweep, reader,
# tracing) when decoding offline.
CONFIG_THREAD_NAME=y
