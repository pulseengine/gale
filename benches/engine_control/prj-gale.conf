# Engine-control benchmark — Gale overlay.
#
# Applied on top of prj.conf to swap Gale's verified primitives into
# the ISR/thread critical path. Only the primitives this benchmark
# actually exercises; adding more would bloat the build without
# affecting measurements.
#
# Note on coverage:
#   Only CONFIG_GALE_KERNEL_SEM differs behaviourally between the two
#   builds on the bench hot path — k_sem_give is the only Gale primitive
#   the ISR calls through to. CONFIG_GALE_KERNEL_TIMER and
#   CONFIG_GALE_KERNEL_SPINLOCK compile in but have no direct call sites
#   inside control_step or the handoff. They're kept on here to exercise
#   the module wiring; if you need a single-primitive isolation experiment,
#   comment them out.
#
#   CONFIG_GALE_KERNEL_SPINLOCK_VALIDATE was previously listed but silently
#   dropped in Kconfig resolution (depends on SMP, not present on
#   qemu_cortex_m3). Removed to avoid the false impression it's active.
#
# Usage:
#   west build -b qemu_cortex_m3 -s benches/engine_control \
#     -d /tmp/engine-gale \
#     -- -DZEPHYR_EXTRA_MODULES=<abs-path-to-gale> \
#        -DOVERLAY_CONFIG=benches/engine_control/prj-gale.conf

CONFIG_GALE_KERNEL_SEM=y
CONFIG_GALE_KERNEL_TIMER=y
CONFIG_GALE_KERNEL_SPINLOCK=y
