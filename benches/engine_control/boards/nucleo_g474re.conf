# NUCLEO-G474RE bench Kconfig overlay — enables ADC for smart-data MCU
# health snapshots (smart_mcu_g4.c).
#
# The DT overlay in `boards/nucleo_g474re.overlay` puts ADC1 + the
# two internal channels (TS=ch16, VREFINT=ch18) in place; without
# CONFIG_ADC, the driver source isn't compiled in and the
# DEVICE_DT_GET(DT_NODELABEL(adc1)) call in smart_mcu_g4.c fails to
# link with `undefined reference to __device_dts_ord_*`.
#
# CONFIG_ADC_STM32 auto-selects when CONFIG_ADC=y and the DT compatible
# match fires.

CONFIG_ADC=y
