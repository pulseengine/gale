[workspace]
[package]
name = "gust-time-provider"
version = "0.1.0"
edition = "2021"
[lib]
crate-type = ["cdylib"]
[dependencies]
gust-os-time-math = { path = "../os-time-math" }
wit-bindgen = { version = "0.52", default-features = false, features = ["macros"] }
[profile.release]
panic = "abort"
opt-level = "s"
lto = true
codegen-units = 1
