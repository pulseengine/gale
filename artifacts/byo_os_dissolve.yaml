# BYO-OS: the dissolved library-OS backing of the kiln component-host path.
# Canonical pipeline meld fuse -> loom -> synth. gale#74 / gale#63 / gale#89.
artifacts:
  - id: SAC-BYOOS-LIBOS
    type: sw-arch-component
    title: "Dissolved library-OS backing: composed component to native ELF via meld fuse, loom, synth"
    status: proposed
    description: >
      The native backing of the kiln component-host path. A gale application
      component (importing gale:kernel) and gale-kiln (providing it over the
      verified gale::* deciders) are statically fused by meld into a single core
      module (import resolution + index-space merge + canonical-ABI at build
      time), then whole-program-optimized by loom and transpiled to a native
      relocatable object by synth. This is the same component that runs on
      wasmtime today; the canonical maximal-wasm pipeline is meld fuse -> loom
      -> synth (meld is the fusion stage - an earlier revision wrongly used wac
      compose + wasm-tools unbundle, which preserves per-component adapters).
      The verification boundary stays the wasm/native seam; isolation between
      dissolved components is the opt-in MPU/PMP layer (gale#86), not the
      dissolve.
    tags: [byo-os, gale74, kiln, dissolve, library-os, meld, synth]
    fields:
      pipeline: "grow-free core (wasm32-unknown-unknown + cabi-realloc-extern) -> loom inline -> synth --relocatable -> native link against TCB arena"
      status-note: "LEAN dissolve WORKING: gale-kiln 972B / gale-app-demo 316B native .text, 0 memory.grow (was ~24848B), via wit-bindgen no-grow branch + TCB __cabi_arena_realloc. See FIND-BYOOS-006. The meld --memory shared FUSED path is now ALSO proven end-to-end on bare metal (FIND-BYOOS-007): one merged-memory core, no TCB arena, boots run-demo()=53 == wasmtime."
    links:
      - type: allocated-from
        target: REQ-BYOOS-CRATE-001

  - id: FIND-BYOOS-006
    type: finding
    title: "Lean MCU dissolve UNBLOCKED via wit-bindgen cabi-realloc-extern (no-grow): 972B/316B grow-free cores"
    status: active
    description: >
      RESOLVED (path validated): building the components for wasm32-unknown-unknown
      against pulseengine/wit-bindgen@integration/embedded-rt-no-grow with the
      cabi-realloc-extern feature routes cabi_realloc to an embedder symbol
      __cabi_arena_realloc (TCB arena, trap-on-exhaustion), so the cores carry
      ZERO memory.grow and dissolve to 972B (gale-kiln) / 316B (gale-app-demo)
      native .text - ~25x leaner than the ~24848B adapter-laden wasip2 build. The
      wasip2 hosted build is unaffected (feature gated not(target_env=p2)). See
      crates/gale-app-demo/dissolve.sh + tcb/cabi_arena.c. Caveats forwarded:
      wit-bindgen#4 (p2 gate) + component new rejects the env arena import (so the
      meld --memory shared path still needs wit-bindgen#6; the core-dissolve path
      here does not). ORIGINAL ANALYSIS (the blocker that this resolves): the
      memory.grow came from
      cabi_realloc (exported, wit-bindgen canonical ABI) -> __rust_alloc ->
      dlmalloc -> sbrk -> memory.grow. After meld fuse the app<->kernel boundary
      is internalized (0 remaining gale:kernel imports), yet the fused core
      STILL exports cabi_realloc (x2) and keeps memory.grow (x2): meld leaves the
      now-vestigial canonical-ABI adapter in place, and being exported loom
      cannot DCE it. That dead allocator is what makes
      meld fuse --memory shared --address-rebase fail
      ("memory.grow not supported with address rebasing"); the multi-memory
      fallback is not MCU-lowerable (synth correctly loud-skips the cross-memory
      copies per synth#369 - right, not a miscompile). Primary fix is meld#298:
      on fusion with a scalar external surface, drop/de-export the internalized
      cabi_realloc + adapter so the allocator+grow DCE and --memory shared works,
      yielding one lean core (wasm-dist 544-byte class, not tens of KB) for
      loom+synth. Building the components #![no_std] no-grow is a secondary
      belt-and-suspenders, not the root cause. Supersedes the earlier mis-routes
      (synth#401 closed). Gale-side tracker: gale#89.
    tags: [byo-os, gale74, dissolve, meld, cabi-realloc, lean-image]
    links:
      - type: refines
        target: SAC-BYOOS-LIBOS

  - id: FIND-BYOOS-007
    type: finding
    title: "meld --memory shared FUSED dissolve proven end-to-end on bare metal (run-demo()=53 == wasmtime)"
    status: active
    description: >
      The single-merged-memory FUSED path that FIND-BYOOS-006 said "still needs
      wit-bindgen#6" is now UNBLOCKED and demonstrated end-to-end, without
      wit-bindgen#6, via Route B: build the components grow-free
      (wasm32-unknown-unknown + cabi-realloc-extern), then
      `wasm-tools component new --import-passthrough env::__cabi_arena_realloc`
      (pulseengine/wasm-tools@feat/import-passthrough, wasm-tools#2) so the arena
      stays an unresolved import rather than dragging in a growing allocator;
      `meld fuse --memory shared --address-rebase` then merges the two components
      into ONE memory (memory.grow=0); strip the fused module's exports down to
      {memory, run-demo} so loom/synth DCE the now-vestigial cabi_realloc adapter
      (the dead-allocator export FIND-BYOOS-006 identified); `synth compile
      --target cortex-m3 --all-exports --relocatable` yields a self-contained
      ET_REL object (.text ~668B, 0 undefined symbols, exports run-demo) with NO
      TCB arena needed. Linked into the gust_fused TCB bin it boots on a
      bare-metal Cortex-M3 (qemu lm3s6965evb, also verified at an 8KB-SRAM link)
      and returns run-demo()=53 - identical to the SAME composed component on
      wasmtime (crates/gale-app-demo/run.sh). This is the "components on top,
      meld-fused into one module, run on the gust stack" vision made executable.
      Reproduce: benches/gust/build-fused.sh; oracle: benches/gust/run-fused.sh.
      Note this complements the per-component TCB-arena dissolve (FIND-BYOOS-006,
      dissolve.sh): that produces one .o per component linked against an arena;
      this produces one fused .o with no cross-component surface. meld#298 (drop
      the vestigial adapter at fusion) would remove the manual export-strip step.
    tags: [byo-os, gale74, dissolve, meld, fused, shared-memory, demonstrator]
    links:
      - type: refines
        target: SAC-BYOOS-LIBOS
      - type: verifies
        target: REQ-BYOOS-MULTIRT-001

  - id: FIND-BYOOS-008
    type: finding
    title: "North-star end-to-end: the dissolved CM composition runs ON the kiln/gust stack (kiln-async drives it as a scheduled task, bare metal)"
    status: active
    description: >
      Closes the "running on our stack" half of the BYO-OS north-star (the other
      half, the dissolve, is FIND-BYOOS-007). gust_stack (benches/gust/src/bin/
      gust_stack.rs) constructs the kiln-async Scheduler — gust's executor — and
      drives the MELD-fused, synth-dissolved Component-Model composition
      (gale-app-demo importing gale:kernel; gale-kiln providing it over the
      verified gale::* deciders) as the body of a kiln task, re-polled every
      scheduler round. Boots bare-metal on qemu Cortex-M3 (lm3s6965evb): 5000
      poll rounds, dissolved run-demo() = 53 every round, 0 mismatches, no wasm
      runtime. So the full path executes end-to-end: components on top (CM) ->
      meld fuse (one merged-memory module) -> synth dissolve (native) -> driven
      by the kiln-async scheduler on the gust stack. gust_fused proved the
      dissolve (one-shot run-demo); this proves the components execute as
      scheduled work on the executor. Next rungs: a richer driven example
      (engine_control control-loop as the task body) and the same on real
      silicon (G474RE/F100).
    tags: [byo-os, gale74, kiln, gust, on-stack, north-star, demonstrator]
    links:
      - type: verifies
        target: REQ-BYOOS-MULTIRT-001
      - type: related-to
        target: SAC-BYOOS-EXEC
