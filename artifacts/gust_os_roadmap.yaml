  - id: FIND-DRV-RTIO-001
    type: finding
    title: "The driver framework adopts the RTIO/io_uring SQ/CQ model — built from gale's verified primitives, not bespoke"
    status: active
    description: >
      State-of-the-art async I/O has converged on the submission/completion-queue
      (SQ/CQ) model: Linux io_uring (lock-free SQE/CQE rings + registered/fixed
      buffers for zero-copy, with an ownership lifecycle — a buffer stays valid until
      its op completes) and Zephyr RTIO (io_uring for embedded: SQE→CQE via the
      `iodev` API, chained for hardware sequencing, batched into DMA transfer lists;
      the Zephyr norm for new async I/O since 3.4.0 — I2C/SPI/sensors). gust does NOT
      invent a driver API; it adopts this shape. The reason it is cheap: gust already
      built every piece, and each is verified — `gale::msgq` (Verus/Rocq/Kani ring) =
      the SQ/CQ rings; kiln-async (Kani) = the executor; the `gust:hal` thin-seam
      driver = the iodev (SQE→CQE); `dma-own`'s `own<buffer>` handoff (Kani 6/6) =
      the registered buffer, whose "valid until complete" rule is io_uring's exact
      ownership lifecycle — but expressed in the Component-Model ownership type system
      so a violation is a type error, not a runtime convention. Net: the same SQ/CQ
      model everyone uses, proof-carrying. Research + full mapping + citations:
      docs/research/driver-framework-rtio-iouring.md.
    tags: [gust, driver, rtio, io-uring, sq-cq, state-of-the-art, non-bespoke]
    links:
      - type: related-to
        target: REQ-DRV-SEAM-001
      - type: related-to
        target: REQ-DMA-OWN-001
      - type: related-to
        target: REQ-OS-SYSCALL-001

  # ============================================================================
  # v0.4.0 — THE CAPABILITY / SYSCALL SEAM  (gust:os)
  # Today the wasm imports ARE the ABI, ad-hoc per demo. v0.4 makes the OS surface
  # a typed capability world: apps import time/log/spawn/channel; the TCB provides
  # them. This is the mediation point multi-tenancy needs. The I/O capability takes
  # the RTIO/io_uring SQ/CQ shape (FIND-DRV-RTIO-001), not ad-hoc per-driver imports.
  # ============================================================================

  - id: REQ-OS-SYSCALL-001
    type: sw-req
    title: "gust:os — a typed capability world is the OS ABI (not ad-hoc imports)"
    status: proposed
    release: v0.4.0
    description: >
      The OS surface an app sees SHALL be a single WIT world `gust:os` exposing
      capabilities as typed interfaces — time (from REQ-DRV-TIMER-001), log,
      task-spawn (kiln), and channel (gale::msgq) — replacing the per-demo ad-hoc
      import list. The I/O capability SHALL take the RTIO/io_uring submission/
      completion-queue shape (`submit(sqe)` / `poll-completion() → cqe` over
      `own<buffer>`; FIND-DRV-RTIO-001) so it is Zephyr-RTIO-native and io_uring-
      shape-compatible, not a bespoke API. An app component SHALL be portable across
      nodes by importing only `gust:os`, with the node's TCB + composed iodevs
      satisfying it. The seam SHALL carry no host Future across the boundary
      (REQ-DRV-ASYNC-001 holds).
    tags: [gust, os, syscall, capability, wit, abi, rtio, io-uring]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-DRV-SEAM-001
      - type: related-to
        target: FIND-DRV-RTIO-001

  # ============================================================================
  # v0.5.0 — ISOLATION / MULTI-TENANCY  (the general-OS jump)
  # Two mutually-distrusting components in one image, isolated by MPU region.
  # Unblocks on synth#404 (multi-memory → per-MPU-region); gale#74 task.
  # ============================================================================

  - id: REQ-OS-MPU-001
    type: sw-req
    title: "MPU-per-component isolation: a fault in one tenant cannot corrupt another"
    status: proposed
    release: v0.5.0
    description: >
      A composed image hosting two or more components SHALL place each component's
      linear memory in a distinct MPU-protected region, such that an out-of-bounds
      access by one tenant faults rather than silently corrupting a sibling or the
      TCB. This requires the meld multi-memory path lowered to per-region layout
      (blocked on synth#404). The isolation boundary SHALL be the wasm memory model
      enforced by hardware, not a trusted check. Kill-criterion: a crafted tenant
      writes outside its region without a fault.
    tags: [gust, isolation, mpu, multi-tenant, byo-os, blocked-synth-404]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-SYSCALL-001

  - id: REQ-OS-MULTITENANT-001
    type: sw-req
    title: "gust hosts mutually-distrusting components over one TCB — a general OS"
    status: proposed
    release: v0.5.0
    description: >
      gust SHALL run two independently-authored, mutually-distrusting components
      concurrently over the single 4-item TCB: each gets only the gust:os
      capabilities it imports (least authority), its own MPU region (REQ-OS-MPU-001),
      and fair kiln scheduling. A misbehaving or crashing tenant SHALL NOT deny the
      other its scheduled progress beyond its fuel budget. This is the property that
      distinguishes an OS from a single fused firmware image.
    tags: [gust, os, multi-tenant, isolation, capability, scheduler]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-MPU-001

