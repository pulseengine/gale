# gust-OS roadmap — the composed operating system, driven on the UNIFIED release
# line (v0.1 sem … → v1.0 multi-tenant OS). gust is not a separate product line:
# the gale verified primitives (sem/mutex/msgq/event) are the supply chain, and
# gust is what they compose INTO — CM components (wac plug → meld fuse → loom
# inline → synth dissolve → native .o) driven by kiln over a 4-item Rust TCB shim.
#
# North-star (2026-07-08, confirmed): a general MULTI-TENANT verified OS — hosting
# mutually-distrusting components, isolated by MPU, over the same thin TCB — not
# only the single-node px4io failsafe. First forward move: DRIVER BREADTH (prove
# the gust:hal seam generalizes past UART/DMA), then the capability/syscall seam,
# then MPU isolation, then the multi-tenant 1.0. Each milestone is rivet-scoped,
# its V closed (Kani/Verus/Rocq), oracle-gated (Renode+silicon boot, byte-identical,
# SRAM/TCB budget), sigil-signed.
#
# Status legend: what BOOTS today (on main @ fea4d21) = the v0.2 composition
# (app+kiln+gale-prims dissolved, uart-thin 254 B, dma-own 218 B, 4-item TCB).
# Everything below v0.3 is PLANNED scope — cuttability is a rivet query that
# returns "not yet" until each V closes.

artifacts:

  # ============================================================================
  # v0.3.0 — DRIVER BREADTH  (the first gust-OS-forward milestone, detailed)
  # Prove the gust:hal thin-seam driver model generalizes beyond UART+DMA:
  # GPIO, hardware-timer, and SPI as verified-wasm protocol over the same seam,
  # each Kani-proven, each adding ZERO new TCB atoms (all ride mmio+irq).
  # ============================================================================

  - id: REQ-DRV-GPIO-001
    type: sw-req
    title: "GPIO is a verified thin-seam driver — pin logic in wasm, TCB = mmio only"
    status: proposed
    release: v0.3.0
    description: >
      Digital I/O (pin mode, read, write, toggle, and the port-bank bit math) SHALL
      be a Component-Model driver whose logic is verified wasm dissolved to native,
      importing ONLY the gust:hal mmio capability. No new TCB atom: the driver
      computes register values and offsets; the TCB only executes the volatile
      read/write it is handed. The pin-config decision (mode/pull/speed encoding)
      SHALL be Kani-proven total over its input domain.
    tags: [gust, driver, gpio, thin-seam, maximal-wasm]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-DRV-SEAM-001
      - type: related-to
        target: REQ-DRV-WASM-001

  - id: REQ-DRV-TIMER-001
    type: sw-req
    title: "Hardware timer is a verified thin-seam driver; the tick source becomes a capability"
    status: proposed
    release: v0.3.0
    description: >
      A general-purpose hardware timer (compare/period/prescaler programming and the
      elapsed/deadline math) SHALL be a verified-wasm driver over gust:hal mmio+irq,
      replacing the hardwired SysTick glue with a composable time capability that
      kiln waitables can target. The deadline/overflow arithmetic SHALL be Kani-proven
      free of wraparound-induced missed or early fires across the 32-bit tick domain.
    tags: [gust, driver, timer, time, thin-seam, kiln]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-DRV-SEAM-001
      - type: related-to
        target: REQ-DRV-ASYNC-001

  - id: REQ-DRV-SPI-001
    type: sw-req
    title: "SPI is a verified thin-seam driver, DMA-capable via the own<buffer> handoff"
    status: proposed
    release: v0.3.0
    description: >
      SPI master (mode/clock config, the transfer state machine, and CS framing)
      SHALL be a verified-wasm driver over gust:hal, and its block path SHALL reuse
      the dma-own own<buffer> handoff (REQ-DMA-OWN-001) rather than a bespoke bridge —
      demonstrating that the DMA ownership model composes UNDER a second driver, not
      only standalone. The transfer FSM (idle→active→complete/abort) SHALL be
      Kani-proven for exclusive bus access and no-lost-byte framing. SPI is the first
      driver to present the RTIO iodev shape (SQE→CQE; FIND-DRV-RTIO-001) — the
      streaming/DMA class where the submission/completion-queue model earns its keep
      (matching Zephyr RTIO's own I2C/SPI/sensor scope).
    tags: [gust, driver, spi, dma, thin-seam, component-model, rtio]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-DRV-SEAM-001
      - type: related-to
        target: REQ-DMA-OWN-001
      - type: related-to
        target: FIND-DRV-RTIO-001

  - id: REQ-DRV-BREADTH-001
    type: sw-req
    title: "The seam generalizes: a multi-driver node composes within the SRAM/TCB budget"
    status: proposed
    release: v0.3.0
    description: >
      A single per-node image composing GPIO + timer + SPI + UART drivers SHALL fit
      the F100 8 KiB SRAM budget and add NO trusted-native atoms beyond the existing
      four (mmio_read/write, irq_poll, and the dma barrier/program pair). This is the
      falsifiable generalization claim: the thin-seam model scales in driver COUNT
      without growing the TCB — the property that makes gust an OS and not a
      one-driver demo. Measured, per REQ-DRV-SRAM-001, and reported in COMPARE.md.
    tags: [gust, driver, breadth, sram, tcb, byo-os]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-DRV-COMPOSE-001
      - type: related-to
        target: REQ-DRV-SRAM-001

  # VER-* verifiers are added by the feature loop WHEN the proof actually passes —
  # that incoming `verifies` link is what drops a req off the `rivet release status`
  # not-ready list, so the burn-down tells the truth. GPIO's is now real (below);
  # TIMER/SPI are still pending their proofs.

  - id: VER-DRV-GPIO-001
    type: sw-verification
    title: "GPIO driver — Kani 4/4 (config total+injective, slot in-range) + Renode register-effect content-gate"
    status: verified
    release: v0.3.0
    description: >
      The gpio-thin driver's pure decision core is Kani-proven (4/4 harnesses, 0
      failures: pin-config nibble bounded + mode-consistent, injective, slot always
      in-range, unknown-mode-safe — exhaustive over `kani::any()`, a genuine proof of
      the source function). End-to-end it is exercised by the `gust-gpio-renode`
      content-gate: the dissolved driver (linked native, mmio bridge only — 0 new TCB
      atoms) configures PC8 and drives it via gpio_set/clear, and the gate asserts the
      exact register values the driver writes (CRH nibble 0x3, BSRR 1<<8 / 1<<24) on a
      real STM32 model, reported over USART1. Source-level proof + native
      register-effect check; the wasm→native dissolve is differentially trusted, not
      proven equivalent (see docs/safety/verification-honesty.md). Kill-criterion: a
      Kani harness fails, or the Renode gate observes a gpio-*-bad line.
    tags: [gust, gpio, kani, renode, verification]
    links:
      - type: verifies
        target: REQ-DRV-GPIO-001

  - id: VER-DRV-TIMER-001
    type: sw-verification
    title: "Timer driver — Kani 3/3 (wrap-safe deadline: no missed/early fire) + Renode register-effect content-gate"
    status: verified
    description: >
      The timer-thin driver's deadline core is Kani-proven (3/3, 0 failures): the
      wrap-safe predicate fires EXACTLY when elapsed ≥ interval for any interval and
      elapsed < 2^31 — including across the u32 counter wrap, so no deadline is missed
      or fired early because the counter wrapped (the REQ-DRV-TIMER-001 property);
      plus reflexive-fires and a 0/1-boolean-export proof. End-to-end the
      `gust-timer-renode` gate exercises the dissolved driver (linked native, mmio
      bridge only — 0 new TCB atoms, table-free per the gpio-thin lesson): configures
      TIM2 (PSC/ARR/CR1) and checks the register writes + the wrap-safe predicate on a
      real STM32 model, reported over USART1. A local qemu semihosting probe of the
      dissolved .o confirmed all cases (init 0x1234/0xABCD/CEN, deadline 149→0/150→1,
      wrap 0xFFFFFFF0+0x20=0x10 → 0x0F→0/0x10→1) before CI. Source-level proof + native
      register-effect check; the wasm→native dissolve is differentially trusted, not
      proven equivalent (see docs/safety/verification-honesty.md). Kill-criterion: a
      Kani harness fails, or the Renode gate observes a timer-*-bad line.
    tags: [gust, timer, kani, renode, verification]
    links:
      - type: verifies
        target: REQ-DRV-TIMER-001

  # NOTE — SPI verifier still pending its proof. Planned bar:
