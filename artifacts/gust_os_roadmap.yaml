# gust-OS roadmap — the composed operating system, driven on the UNIFIED release
# line (v0.1 sem … → v1.0 multi-tenant OS). gust is not a separate product line:
# the gale verified primitives (sem/mutex/msgq/event) are the supply chain, and
# gust is what they compose INTO — CM components (wac plug → meld fuse → loom
# inline → synth dissolve → native .o) driven by kiln over a 4-item Rust TCB shim.
#
# North-star (2026-07-08, confirmed): a general MULTI-TENANT verified OS — hosting
# mutually-distrusting components, isolated by MPU, over the same thin TCB — not
# only the single-node px4io failsafe. First forward move: DRIVER BREADTH (prove
# the gust:hal seam generalizes past UART/DMA), then the capability/syscall seam,
# then MPU isolation, then the multi-tenant 1.0. Each milestone is rivet-scoped,
# its V closed (Kani/Verus/Rocq), oracle-gated (Renode+silicon boot, byte-identical,
# SRAM/TCB budget), sigil-signed.
#
# Status legend: what BOOTS today (on main @ fea4d21) = the v0.2 composition
# (app+kiln+gale-prims dissolved, uart-thin 254 B, dma-own 218 B, 4-item TCB).
# Everything below v0.3 is PLANNED scope — cuttability is a rivet query that
# returns "not yet" until each V closes.

