    type: sw-verification
    title: "GPIO driver — Kani 4/4 (config total+injective, slot in-range) + Renode register-effect content-gate"
    status: verified
    release: v0.3.0
    description: >
      The gpio-thin driver's pure decision core is Kani-proven (4/4 harnesses, 0
      failures: pin-config nibble bounded + mode-consistent, injective, slot always
      in-range, unknown-mode-safe — exhaustive over `kani::any()`, a genuine proof of
      the source function). End-to-end it is exercised by the `gust-gpio-renode`
      content-gate: the dissolved driver (linked native, mmio bridge only — 0 new TCB
      atoms) configures PC8 and drives it via gpio_set/clear, and the gate asserts the
      exact register values the driver writes (CRH nibble 0x3, BSRR 1<<8 / 1<<24) on a
      real STM32 model, reported over USART1. Source-level proof + native
      register-effect check; the wasm→native dissolve is differentially trusted, not
      proven equivalent (see docs/safety/verification-honesty.md). Kill-criterion: a
      Kani harness fails, or the Renode gate observes a gpio-*-bad line.
    tags: [gust, gpio, kani, renode, verification]
    links:
