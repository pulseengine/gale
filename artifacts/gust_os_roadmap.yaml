  - id: REQ-DRV-WDG-001
    type: sw-req
    title: "IWDG watchdog is a verified thin-seam driver — the software cannot-un-start hardware backstop"
    status: implemented
    release: v0.3.0
    description: >
      The STM32F1 independent watchdog (IWDG) key-sequence lifecycle — 0x5555 unlock,
      PR/RLR prescaler+reload configuration (write-protected until unlocked), 0xCCCC
      start, 0xAAAA refresh — SHALL be a Component-Model driver whose full protocol
      logic is verified wasm dissolved to native, importing ONLY the gust:hal mmio
      capability. No new TCB atom: the driver computes the key writes and the PR/RLR
      field encoding; the TCB only executes the volatile read/write it is handed.
      Once started (0xCCCC) the watchdog SHALL be irreversible in software — the
      driver SHALL expose no disable/stop transition, so only a hardware reset can
      stop it (cannot-un-start). This is the module-level hardware backstop the
      partition-scheduler Health Monitor design (gale#63) names: if the verified
      HM/switch core itself hangs, it stops refreshing the IWDG and the hardware
      forces a reset — fail-to-safe. The lifecycle FSM SHALL be Kani-proven total
      over its input domain, including that write-protection and cannot-un-start
      hold for every reachable state.
    tags: [gust, driver, wdg, watchdog, iwdg, thin-seam, fail-to-safe, health-monitor]
