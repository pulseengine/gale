  - id: REQ-DRV-ADC-001
    type: sw-req
    title: "ADC is a verified thin-seam driver — read-after-EOC exactly-once analog input"
    status: implemented
    release: v0.3.0
    description: >
      The STM32F1 ADC single-conversion path — the SMPR sample-time and SQR
      regular-sequence configuration and the enable→start→EOC→read master conversion
      cycle — SHALL be a Component-Model driver whose full protocol logic is verified
      wasm dissolved to native, importing ONLY the gust:hal mmio capability. No new TCB
      atom: the driver computes the SMPR/SQR field encodings (table-free, pure bit
      arithmetic) and the CR2 ADON/SWSTART writes; the TCB only executes the volatile
      read/write it is handed. The conversion result register (DR) SHALL be readable
      ONLY after End-Of-Conversion and consumed exactly once per conversion
      (read-after-EOC, exactly-once): reading before EOC yields a stale/garbage sample
      and letting the ADC free-run (CONT=1) or reading twice yields a torn value — both
      MUST be rejected without mutating the FSM. Single-shot SHALL hold: a completed
      conversion returns to Ready, never Converting, so the ADC never free-runs, and
      the only path back to Converting is an explicit start. The lifecycle FSM SHALL be
      Kani-proven total over its input domain, including channel bounds, phase-gating,
      the read-after-EOC rule, and a total disable from every reachable state. This is
      the analog-sensor input the partition-scheduler control loops (gale#63) consume:
      a proof-carrying single sample per command, never a stale one silently used as a
      control input.
    tags: [gust, driver, adc, analog, thin-seam, read-after-eoc, single-shot, health-monitor]
  - id: REQ-DRV-DAC-001
    type: sw-req
    title: "DAC is a verified thin-seam driver — glitch-free, trigger-gated analog output"
    status: implemented
    release: v0.3.0
    description: >
      The STM32F1 software-triggered DAC path — CR channel/trigger configuration
      (EN | TEN | TSEL=software), the data holding register (DHR) staging write, the
      software trigger (SWTRIGR), and the data output register (DOR) read-back — SHALL
      be a Component-Model driver whose full protocol logic is verified wasm dissolved
      to native, importing ONLY the gust:hal mmio capability. No new TCB atom: the
      driver computes the CR word, the DHR/DOR/SWTRIGR offsets, and the 12-bit code
      encoding; the TCB only executes the volatile read/write it is handed. The output
      SHALL be glitch-free and trigger-gated: writing DHR SHALL NOT move the pin (DOR
      updates only when a trigger fires), so a control loop can stage a new code and
      publish it atomically, never emitting a half-updated value on an actuator line.
      Every commanded value SHALL be clamped to a 12-bit code (no overrange), and the
      lifecycle FSM SHALL be Kani-proven total over its input domain, including that
      the output equals the last LOADED value and changes ONLY on an explicit trigger.
    tags: [gust, driver, dac, analog, thin-seam, glitch-free, actuator]
    links:
