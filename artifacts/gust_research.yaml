# Gust research findings — the novelty claim and the open rigor gaps surfaced by
# the "how novel is this / what can we improve" research pass on the gust
# maximal-wasm mini-RTOS (see docs/gust-architecture.md = DOC-GUST-ARCH, which
# links back to these artifacts in its frontmatter).
#
# FIND-GUST-001 is the unique positive finding (no public precedent); it
# generates the gust thesis system requirement (SYSREQ-GUST-001). The remaining
# findings are the gaps that finding's own scrutiny exposed — each generates a
# sw requirement the gust thesis must close before it is a *safety* claim rather
# than a demonstration.

artifacts:
  # ── The gust thesis as a system requirement (generated by the novelty find) ─
  - id: SYSREQ-GUST-001
    type: system-req
    title: "gust: an RTOS whose kernel is verified wasm dissolved to native, TCB = a ~4-fn shim"
    status: draft
    description: >
      gust shall realise a hard-real-time kernel for tiny bare-metal nodes whose
      single source of kernel truth is a separately-verifiable WebAssembly module
      (kiln-async cooperative fuel-bounded scheduler + sem/mutex/msgq/timeout/
      event primitives), dissolved to native machine code (meld -> loom -> synth)
      with no runtime wasm interpretation, leaving only a ~4-function native shim
      as the Trusted Computing Base. This is the novel construction recorded in
      FIND-GUST-001; the requirements it generates (WCET, ISR concurrency, and
      toolchain-trust) are the conditions under which it composes into a
      safety claim.
    tags: [gust, thesis, wasm-rtos, tcb, wcet]
    fields:
      req-type: functional
      priority: must
    links:
      - type: derives-from
        target: STKH-001

  # ── The novel contribution ────────────────────────────────────────────────
  - id: FIND-GUST-001
    type: finding
    title: "No public precedent for a WebAssembly-as-RTOS-kernel dissolved to native"
    status: active
    description: >
      Research into prior art found no public precedent for gust's central
      construction: an RTOS whose *kernel* (the kiln-async cooperative
      fuel-bounded scheduler + sem/mutex/msgq/timeout/event primitives) is
      authored as WebAssembly and then **dissolved to native machine code**
      (meld -> loom -> synth) so that nothing interprets wasm at runtime, leaving
      only a ~4-function hand-written native shim as the Trusted Computing Base
      (vector table + reset, SysTick -> time/fuel, a handful of MMIO imports,
      wake-from-ISR).

      The adjacent prior art is categorically different:
      - **wasm microruntimes on MCUs** (WAMR, wasm3, Wasmtime-tiny): ship a wasm
        *interpreter / JIT* that runs on top of a conventional native RTOS — the
        wasm is the *application*, the kernel stays native. gust inverts this:
        the *kernel* is wasm and there is no runtime.
      - **unikernels / RTOS-in-a-language** (Hubris, Tock, RTIC, Theseus): native
        Rust kernels — memory-safe, but not wasm-sourced and not dissolved, so
        they cannot inherit wasm's portable verification artifact + the
        target-independent dissolution-validation oracle.
      - **proof-carrying / verified microkernels** (seL4): C/proof, not a
        wasm-dissolved pipeline; the TCB is the whole kernel, not a ~4-fn shim.

      The novelty is the *combination*: a portable, separately-verifiable wasm
      module as the single source of kernel truth; a deterministic dissolution to
      native with a translation-validation oracle (loom#219 acyclic-CF Z3); and a
      TCB shrunk to a handful of native functions — yielding memory-safety by
      construction, a fuel-based WCET that is a *proof* (kiln fuel == spar
      RTA/EDF Lean unit), and an auditable trust surface. This is the
      contribution worth defending and the reason the gaps below matter.
    tags: [gust, research, novelty, wasm-rtos, tcb, wcet]
    fields:
      relevance: high
      action-required: false
      source: "prior-art scan, 2026-06; precedent: none found — WAMR/wasm3 = wasm app on native kernel; Hubris/Tock/seL4 = native kernel; none dissolve a wasm kernel to native with a translation-validation oracle"
    links:
      - type: generates
        target: SYSREQ-GUST-001

  # ── Open rigor gaps (each generates a requirement to close) ───────────────
  - id: FIND-GUST-002
    type: finding
    title: "Native-shim TCB has a WCET the kiln fuel model does not cover"
    status: active
    description: >
      gust's schedulability/WCET argument rests on kiln-async being
      fuel-bounded (fuel == the spar RTA/EDF Lean unit). But the ~4-function
      native shim — reset/vector entry, the SysTick handler, the MMIO import
      bodies, and the wake-from-ISR path — executes *outside* the fuel model:
      no fuel is charged for native shim code. Its worst-case cycle cost
      (interrupt entry/exit latency + the longest MMIO body) is therefore an
      uncovered addend to any end-to-end WCET. Until it is bounded separately
      and added to the fuel-derived bound, the "WCET is a proof" claim holds
      only for the wasm-dissolved kernel, not for the whole system.
    tags: [gust, research, wcet, tcb, gap]
    fields:
      relevance: high
      action-required: true
    links:
      - type: generates
        target: REQ-GUST-WCET-001

  - id: FIND-GUST-003
    type: finding
    title: "Wake-from-ISR path needs a concurrency (lost-wakeup / torn-read) proof"
    status: active
    description: >
      The native shim signals the cooperative scheduler from interrupt context
      via a single `pending` word with a BASEPRI read-clear sequence. This is
      the one place where ISR context and thread context share mutable state,
      so it is the system's sole concurrency hazard: a lost wakeup (ISR sets a
      bit the scheduler's read-clear races past) or a torn read would break the
      liveness the fuel-bounded scheduler assumes. Single-core Cortex-M with
      BASEPRI masking makes this tractable, but it is currently argued by
      construction, not proven. It needs a machine-checked concurrency proof
      (the same Verus/Kani rigor applied to the kernel primitives) over the
      ISR/scheduler interleavings.
    tags: [gust, research, concurrency, wake-from-isr, tcb, gap]
    fields:
      relevance: high
      action-required: true
    links:
      - type: generates
        target: REQ-GUST-ISR-001

  - id: FIND-GUST-004
    type: finding
    title: "The wasm->native toolchain (meld/loom/synth) sits in the TCB and needs a trust argument"
    status: active
    description: >
      gust shrinks the *hand-written* TCB to ~4 native functions, but the
      correctness of everything else depends on the meld -> loom -> synth
      pipeline faithfully dissolving the verified wasm kernel into the shipped
      native code. That toolchain is therefore part of the trusted base. The
      loom#219 acyclic-CF Z3 translation validator covers the seam-dissolution
      step, but there is no end-to-end qualification/trust story for the whole
      pipeline (a tool-qualification argument à la ISO 26262 / DO-330, or
      per-build proof-carrying validation that the emitted native code refines
      the verified wasm). Without it, "the only trusted native surface is the
      ~4-fn shim" is incomplete — the compiler is trusted too.
    tags: [gust, research, tcb, tool-qualification, compiler, gap]
    fields:
      relevance: high
      action-required: true
    links:
      - type: generates
        target: REQ-GUST-TCB-001

  # ── Requirements the gaps generate (gust release scope) ───────────────────
  - id: REQ-GUST-WCET-001
    type: sw-req
    title: "Bound the native-shim TCB worst-case execution time independently of the fuel model"
    status: draft
    description: >
      The gust native shim's worst-case execution time (interrupt entry/exit
      latency, SysTick handler, the longest MMIO import body, and the
      wake-from-ISR path) shall be bounded by static analysis or measured
      worst-case on the target, and that bound shall be composed with the
      kiln fuel-derived bound to yield a whole-system WCET. The fuel model
      alone does not cover native shim code.
    tags: [gust, wcet, tcb]
    fields:
      req-type: performance
      priority: must
      verification-criteria: >
        A documented WCET for each native-shim entry (Renode/silicon worst-case
        or static bound), summed with the fuel-derived kernel bound, presented
        as the end-to-end system WCET.
    links:
      - type: derives-from
        target: SYSREQ-GUST-001

  - id: REQ-GUST-ISR-001
    type: sw-req
    title: "Prove the wake-from-ISR path free of lost-wakeup and torn-read races"
    status: draft
    description: >
      The wake-from-ISR mechanism (single `pending` word, BASEPRI read-clear)
      shall be proven, by machine-checked concurrency reasoning over the
      ISR/scheduler interleavings on single-core Cortex-M, to admit no lost
      wakeup and no torn read — i.e. every interrupt-set wake is observed by
      the scheduler exactly once and liveness of the fuel-bounded scheduler is
      preserved.
    tags: [gust, concurrency, wake-from-isr, tcb]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        A Verus/Kani (or equivalent) proof artifact over the pending-word
        read-clear vs ISR-set interleavings, with the masking assumption
        (BASEPRI) made explicit and discharged.
    links:
      - type: derives-from
        target: SYSREQ-GUST-001

  - id: REQ-GUST-TCB-001
    type: sw-req
    title: "Document a trust/qualification argument for the wasm->native toolchain in the TCB"
    status: draft
    description: >
      Because the meld -> loom -> synth pipeline that dissolves the verified
      wasm kernel into native code is part of the trusted computing base, gust
      shall carry a documented trust argument for it: either a tool-qualification
      case (ISO 26262 / DO-330 style) or per-build proof-carrying validation
      that the emitted native code refines the verified wasm module (extending
      the loom#219 acyclic-CF validator from the seam step to end-to-end).
    tags: [gust, tcb, tool-qualification, compiler]
    fields:
      req-type: constraint
      priority: must
      verification-criteria: >
        A trust-case document (or per-build validation artifact) covering the
        meld/loom/synth dissolution, referenced from DOC-GUST-ARCH.
    links:
      - type: derives-from
        target: SYSREQ-GUST-001
