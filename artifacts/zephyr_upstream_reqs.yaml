    type: stakeholder-req
    title: "Zephyr: Mutex Lock With Timeout"
    status: approved
    description: >
      The Zephyr RTOS mutex lock shall block the calling thread with a timeout when the mutex is held by another thread, or return -EBUSY immediately when called with K_NO_WAIT.
    tags: [zephyr, upstream, mutex]
    fields:
      priority: must
      source: "reqmgmt/mutex.sdoc ZEP-SRS-MUT-3"
