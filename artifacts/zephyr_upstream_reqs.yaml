  - id: ZEP-SRS-MUT-2
    type: stakeholder-req
    title: "Zephyr: Mutex Priority Inheritance"
    status: approved
    description: >
      The Zephyr RTOS mutex shall provide priority inheritance to prevent priority inversion, ensuring the mutex owner temporarily inherits the priority of the highest-priority waiting thread.
    tags: [zephyr, upstream, mutex]
    fields:
      priority: must
      source: "reqmgmt/mutex.sdoc ZEP-SRS-MUT-2"
    links:
