  - id: ZEP-SRS-MUT-1
    type: stakeholder-req
    title: "Zephyr: Mutex Reentrant Locking"
    status: approved
    description: >
      The Zephyr RTOS mutex shall support reentrant locking by the owning thread, incrementing the lock count on each successive lock by the same owner.
    tags: [zephyr, upstream, mutex]
    fields:
      priority: must
      source: "reqmgmt/mutex.sdoc ZEP-SRS-MUT-1"
