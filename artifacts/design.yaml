  # ── Software detailed design — MsgQ (SWE.3) ────────────────────────────

  - id: SWDD-MQ-INIT
    type: sw-detail-design
    title: "MsgQ::init — k_msgq_init port"
    status: approved
    description: >
      Validate msg_size > 0, max_msgs > 0, and msg_size * max_msgs does
      not overflow u32. Initialize read_idx, write_idx, used_msgs to 0.
    tags: [msgq, init]
    fields:
      unit: plain/src/msgq.rs
      function: "MsgQ::init"
      algorithm: >
        if msg_size == 0 || max_msgs == 0 || overflow: Err(EINVAL);
        else Ok(MsgQ { ... all zero ... })
    links:
      - type: refines
        target: SWARCH-MQ-001
      - type: satisfies
        target: SWREQ-MQ-MQ01
      - type: function-maps-to
        target: PROV-MQ-001

  - id: SWDD-MQ-PUT
    type: sw-detail-design
    title: "MsgQ::put — z_impl_k_msgq_put index advancement"
    status: approved
    description: >
      If queue is full: return Err(ENOMSG). Otherwise return Ok(write_idx)
      for the caller to copy data, advance write_idx = (write_idx + 1) %
      max_msgs, and increment used_msgs.
    tags: [msgq, put]
    fields:
      unit: plain/src/msgq.rs
      function: "MsgQ::put"
      algorithm: >
        if used_msgs == max_msgs: ENOMSG; else: slot = write_idx;
        advance; used_msgs += 1; Ok(slot)
    links:
      - type: refines
        target: SWARCH-MQ-001
      - type: satisfies
        target: SWREQ-MQ-MQ02
      - type: satisfies
        target: SWREQ-MQ-MQ03
      - type: satisfies
        target: SWREQ-MQ-MQ06
      - type: function-maps-to
        target: PROV-MQ-001

  - id: SWDD-MQ-PUT-FRONT
    type: sw-detail-design
    title: "MsgQ::put_front — z_impl_k_msgq_put_front index retreat"
    status: approved
    description: >
      If queue is full: return Err(ENOMSG). Otherwise retreat read_idx =
      (read_idx + max_msgs - 1) % max_msgs, increment used_msgs, return
      Ok(read_idx).
    tags: [msgq, put-front]
    fields:
      unit: plain/src/msgq.rs
      function: "MsgQ::put_front"
      algorithm: >
        if full: ENOMSG; else: read_idx = (read_idx + max_msgs - 1) %
        max_msgs; used_msgs += 1; Ok(read_idx)
    links:
      - type: refines
        target: SWARCH-MQ-001
      - type: satisfies
        target: SWREQ-MQ-MQ04
      - type: function-maps-to
        target: PROV-MQ-001

  - id: SWDD-MQ-GET
    type: sw-detail-design
    title: "MsgQ::get — z_impl_k_msgq_get index advancement"
    status: approved
    description: >
      If queue is empty: return Err(ENOMSG). Otherwise return Ok(read_idx)
      for the caller to copy data, advance read_idx = (read_idx + 1) %
      max_msgs, and decrement used_msgs.
    tags: [msgq, get]
    fields:
      unit: plain/src/msgq.rs
      function: "MsgQ::get"
      algorithm: >
        if used_msgs == 0: ENOMSG; else: slot = read_idx; advance;
        used_msgs -= 1; Ok(slot)
    links:
      - type: refines
        target: SWARCH-MQ-001
      - type: satisfies
        target: SWREQ-MQ-MQ05
      - type: satisfies
