    type: sw-detail-design
    title: "CondVar::signal — z_impl_k_condvar_signal port"
    status: approved
    description: >
      Wake the highest-priority waiting thread. If wait queue is empty,
      return Empty (no-op). Otherwise unpend first thread and return
      Woke(thread).
    tags: [condvar, signal]
    fields:
      unit: plain/src/condvar.rs
      function: "CondVar::signal"
      algorithm: >
        match self.wait_q.unpend_first(OK) { Some(t) => Woke(t), None => Empty }
    links:
