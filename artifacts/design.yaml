  # ── Software detailed design — Mutex (SWE.3) ───────────────────────────

  - id: SWDD-MUT-INIT
    type: sw-detail-design
    title: "Mutex::init — z_impl_k_mutex_init port"
    status: approved
    description: >
      Constructs a mutex with empty WaitQueue, owner=None, lock_count=0.
    tags: [mutex, init]
    fields:
      unit: plain/src/mutex.rs
      function: "Mutex::init"
      algorithm: >
        Ok(Mutex { wait_q: WaitQueue::new(), owner: None, lock_count: 0 })
    links:
