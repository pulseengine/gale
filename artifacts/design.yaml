      - type: function-maps-to
        target: PROV-MUT-001

  - id: SWDD-MUT-LOCK
    type: sw-detail-design
    title: "Mutex::try_lock — z_impl_k_mutex_lock non-blocking port"
    status: approved
    description: >
      If unlocked (owner is None): set owner=current_id, lock_count=1,
      return Acquired. If owner matches current_id: reentrant lock,
      lock_count+=1, return Acquired. If owned by another thread:
      return WouldBlock.
    tags: [mutex, lock]
    fields:
      unit: plain/src/mutex.rs
      function: "Mutex::try_lock"
      algorithm: >
        match self.owner { None => acquire, Some(id) if id == current =>
        reentrant, Some(_) => WouldBlock }
    links:
      - type: refines
        target: SWARCH-MUT-001
      - type: satisfies
        target: SWREQ-MUT-M03
      - type: satisfies
        target: SWREQ-MUT-M04
      - type: satisfies
        target: SWREQ-MUT-M05
      - type: function-maps-to
        target: PROV-MUT-001

  - id: SWDD-MUT-LOCK-BLOCKING
    type: sw-detail-design
    title: "Mutex::lock_blocking — z_impl_k_mutex_lock blocking port"
    status: approved
    description: >
      Block the calling thread and insert it into the wait queue in
      priority order. Called when mutex is owned by another thread and
      timeout is not K_NO_WAIT.
    tags: [mutex, lock, blocking]
    fields:
      unit: plain/src/mutex.rs
      function: "Mutex::lock_blocking"
      algorithm: >
        thread.block(); self.wait_q.pend(thread)
    links:
      - type: refines
        target: SWARCH-MUT-001
      - type: satisfies
        target: SWREQ-MUT-M05
      - type: satisfies
        target: SWREQ-MUT-M11
      - type: function-maps-to
        target: PROV-MUT-001

  - id: SWDD-MUT-UNLOCK
    type: sw-detail-design
    title: "Mutex::unlock — z_impl_k_mutex_unlock port"
    status: approved
    description: >
      If not locked (owner is None): return Err(EINVAL). If caller is not
      owner: return Err(EPERM). If lock_count > 1: decrement lock_count,
      return Released. If waiters exist: transfer ownership to
      highest-priority waiter, return Transferred. Otherwise: clear owner
      and lock_count, return Unlocked.
    tags: [mutex, unlock]
    fields:
      unit: plain/src/mutex.rs
      function: "Mutex::unlock"
      algorithm: >
        validate owner == current_id; if lock_count > 1: decrement;
        elif waiters: transfer; else: clear
    links:
      - type: refines
        target: SWARCH-MUT-001
      - type: satisfies
        target: SWREQ-MUT-M06
      - type: satisfies
        target: SWREQ-MUT-M07
      - type: satisfies
        target: SWREQ-MUT-M08
      - type: satisfies
        target: SWREQ-MUT-M09
      - type: satisfies
        target: SWREQ-MUT-M10
      - type: function-maps-to
        target: PROV-MUT-001

