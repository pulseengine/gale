      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on submit(). Proof lemma_submit_idempotent.
    links:
      - type: derives-from
        target: SYSREQ-WK-001

  - id: SWREQ-WK-WK05
    type: sw-req
    title: "WK5: cancel clears QUEUED and sets CANCELING if RUNNING"
    status: approved
    description: >
      Cancel always clears the QUEUED flag. If still busy (RUNNING),
      the CANCELING flag is set.
    tags: [work, cancel, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on cancel(). Proof lemma_cancel_clears_queued.
    links:
      - type: derives-from
        target: SYSREQ-WK-001

  - id: SWREQ-WK-WK06
    type: sw-req
    title: "WK6: state flags are mutually consistent"
