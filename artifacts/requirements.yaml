        target: STKH-001

  # ── Event: Software requirements (8 ASIL-D properties) ────────────────

  - id: SWREQ-EV-EV01
    type: sw-req
    title: "EV1: post ORs bits"
    status: approved
    description: >
      When post is called with a bitmask, the event's current value is
      updated to the bitwise OR of the current value and the posted bits.
    tags: [event, post, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on post(). Unit test post_ors_bits.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV02
    type: sw-req
    title: "EV2: set replaces"
    status: approved
    description: >
      When set is called with a bitmask, the event's current value is
      replaced entirely with the given bitmask.
    tags: [event, set, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on set(). Unit test set_replaces_value.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV03
    type: sw-req
    title: "EV3: clear ANDs complement"
    status: approved
    description: >
      When clear is called with a bitmask, the event's current value is
      updated to the bitwise AND of the current value and the complement
      of the clear mask.
    tags: [event, clear, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on clear(). Unit test clear_ands_complement.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV04
    type: sw-req
    title: "EV4: set_masked selective"
    status: approved
    description: >
      When set_masked is called with a value and a mask, only the bits
      selected by the mask are updated to the corresponding bits from
      the value; unmasked bits are preserved.
    tags: [event, set-masked, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on set_masked(). Unit test set_masked_selective.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV05
    type: sw-req
    title: "EV5: wait_any condition"
    status: approved
    description: >
      wait_any is satisfied when the bitwise AND of the event value and
      the requested mask is non-zero (at least one requested bit is set).
    tags: [event, wait-any, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on wait_any(). Unit test wait_any_condition.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV06
    type: sw-req
    title: "EV6: wait_all condition"
    status: approved
    description: >
      wait_all is satisfied when the bitwise AND of the event value and
      the requested mask equals the requested mask (all requested bits
      are set).
    tags: [event, wait-all, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on wait_all(). Unit test wait_all_condition.
    links:
      - type: derives-from
        target: SYSREQ-EV-001

  - id: SWREQ-EV-EV07
    type: sw-req
    title: "EV7: valid bitmask"
