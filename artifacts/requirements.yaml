  # ── Fatal: System requirement ──────────────────────────────────────────

  - id: SYSREQ-FT-001
    type: system-req
    title: Fatal error classification and recovery model
    status: approved
    description: >
      A fatal error classification model that matches Zephyr's fatal.c
      semantics: reason code mapping, recovery decision based on
      context (thread/ISR) and mode (production/test).
    tags: [fatal, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 4 properties (FT1-FT4) verified by Verus SMT proofs
        and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001

  - id: SWREQ-FT-FT01
    type: sw-req
    title: "FT1: all reason codes map to a valid FatalReason variant"
    status: approved
    description: >
      All valid numeric reason codes (0-4) map to a defined FatalReason
      variant. Invalid codes return None.
    tags: [fatal, mapping, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on from_code(). Proof lemma_valid_codes_map.
    links:
      - type: derives-from
        target: SYSREQ-FT-001

  - id: SWREQ-FT-FT02
    type: sw-req
    title: "FT2: kernel panic is always non-recoverable"
    status: approved
    description: >
      KernelPanic always results in Halt in production mode,
      regardless of thread or ISR context.
    tags: [fatal, panic, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures on classify(). Proof lemma_panic_halts.
    links:
      - type: derives-from
        target: SYSREQ-FT-001

  - id: SWREQ-FT-FT03
    type: sw-req
    title: "FT3: recoverable decision depends on reason and context"
    status: approved
    description: >
      Thread-context non-panic faults are recoverable (AbortThread).
      ISR-context faults in production generally halt. Test mode is
      more permissive.
    tags: [fatal, recovery, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on classify(). Proofs lemma_thread_faults_recoverable,
        lemma_test_mode_permissive.
    links:
      - type: derives-from
        target: SYSREQ-FT-001

  - id: SWREQ-FT-FT04
    type: sw-req
    title: "FT4: reason codes are distinct (no overlap)"
    status: approved
    description: >
      Each reason code maps to a unique FatalReason variant. No two
      codes produce the same variant.
    tags: [fatal, distinct, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures. Proof lemma_reason_codes_distinct.
    links:
      - type: derives-from
        target: SYSREQ-FT-001

  # ── MemPool: System requirement ────────────────────────────────────────

  - id: SYSREQ-MP-001
    type: system-req
    title: Fixed-block memory pool model
    status: approved
    description: >
      A fixed-block memory pool model with alloc/free tracking.
      Must maintain allocation bounds, conservation invariant,
      and overflow safety.
    tags: [mempool, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 6 properties (MP1-MP6) verified by Verus SMT proofs
        and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001

  - id: SWREQ-MP-MP01
    type: sw-req
    title: "MP1: 0 <= allocated <= capacity (bounds invariant)"
    status: approved
    description: >
      The number of allocated blocks never exceeds the pool capacity.
    tags: [mempool, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures/invariant on all methods.
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  - id: SWREQ-MP-MP02
    type: sw-req
    title: "MP2: alloc when allocated < capacity increments by 1"
    status: approved
    description: >
      When a block is available, alloc increments the allocated count.
    tags: [mempool, alloc, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on alloc().
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  - id: SWREQ-MP-MP03
    type: sw-req
    title: "MP3: alloc when full returns ENOMEM"
    status: approved
    description: >
      When the pool is full (allocated == capacity), alloc returns
      ENOMEM without modifying state.
    tags: [mempool, alloc, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on alloc(). Proof lemma_full_rejects_alloc.
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  - id: SWREQ-MP-MP04
    type: sw-req
    title: "MP4: free when allocated > 0 decrements by 1"
    status: approved
    description: >
      When blocks are allocated, free decrements the allocated count.
    tags: [mempool, free, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on free(). Proof lemma_alloc_free_roundtrip.
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  - id: SWREQ-MP-MP05
    type: sw-req
    title: "MP5: conservation: free_blocks + allocated == capacity"
    status: approved
    description: >
      The sum of free and allocated blocks always equals the pool
      capacity.
    tags: [mempool, conservation, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus free_get ensures. Proof lemma_conservation.
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  - id: SWREQ-MP-MP06
    type: sw-req
    title: "MP6: no arithmetic overflow in any operation"
    status: approved
    description: >
      All arithmetic (alloc, free, total_size) is overflow-safe
      via bounds checks or u64 intermediates.
    tags: [mempool, safety, overflow, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus overflow-free proof. Proof lemma_total_size_overflow.
    links:
      - type: derives-from
        target: SYSREQ-MP-001

  # ── Dynamic: System requirement ────────────────────────────────────────

  - id: SYSREQ-DY-001
    type: system-req
    title: Dynamic thread pool stack accounting model
    status: approved
    description: >
