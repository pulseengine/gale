    tags: [work, submit, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on submit().
    links:
      - type: derives-from
        target: SYSREQ-WK-001

  - id: SWREQ-WK-WK03
    type: sw-req
    title: "WK3: submit while CANCELING returns EBUSY"
    status: approved
    description: >
      A work item that is being canceled cannot be resubmitted.
      Submit returns EBUSY and state is unchanged.
    tags: [work, cancel, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures on submit(). Proof lemma_submit_rejects_canceling.
    links:
      - type: derives-from
        target: SYSREQ-WK-001

  - id: SWREQ-WK-WK04
    type: sw-req
    title: "WK4: submit while already QUEUED is idempotent"
    status: approved
    description: >
