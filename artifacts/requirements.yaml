# Requirements — ASPICE V-model traceability from stakeholder through SW level.
#
# Hierarchy:
#   STKH-001 (stakeholder)
#     → SYSREQ-SEM-001 (system) → SWREQ-SEM-P01..P10 (software)
#     → SYSREQ-MUT-001 (system) → SWREQ-MUT-M01..M11 (software)
#     → SYSREQ-CV-001  (system) → SWREQ-CV-C01..C08  (software)
#     → SYSREQ-MQ-001  (system) → SWREQ-MQ-MQ01..MQ13 (software)
#     → SYSREQ-SK-001  (system) → SWREQ-SK-SK01..SK09 (software)
#     → SYSREQ-PP-001  (system) → SWREQ-PP-PP01..PP10 (software)
#
# The verified properties are the ASIL-D formal specifications.
# Each maps directly to a property in the Verus/Rocq specs.

artifacts:
  # ── Stakeholder requirement ──────────────────────────────────────────────
  - id: STKH-001
    type: stakeholder-req
    title: Formally verified kernel primitives for ASIL-D
    status: approved
    description: >
      Replace Zephyr kernel synchronization primitives (sem.c, mutex.c, etc.)
      with formally verified Rust implementations that preserve identical
      functional behavior while proving safety properties to ASIL-D level
      via SMT solving (Verus) and theorem proving (Rocq).
    tags: [safety, asil-d, formal-verification]
    fields:
      priority: must
      source: "ISO 26262 ASIL-D — highest automotive safety integrity level"
    links:
      - type: derives-from
        target: ZEP-SYRS-14

  # ── System requirement ───────────────────────────────────────────────────
  - id: SYSREQ-SEM-001
    type: system-req
    title: Counting semaphore with init/give/take/reset
    status: approved
    description: >
      A counting semaphore that matches the Zephyr k_sem API semantics:
      initialization with count and limit, give (signal), take (wait),
      and reset.  Must maintain priority-ordered wait queue for blocked
      threads and never exhibit undefined behavior or arithmetic overflow.
    tags: [sem, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 10 properties (P1-P10) verified by Verus SMT proofs,
        Rocq theorem proofs, and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001
      - type: derives-from
        target: ZEP-SYRS-14

  # ── Software requirements: the 10 ASIL-D properties ─────────────────────
  #
  # Each traces to SYSREQ-SEM-001 AND the specific Zephyr upstream SRS
  # requirements it satisfies (from zephyrproject-rtos/reqmgmt semaphore.sdoc).

  - id: SWREQ-SEM-P01
    type: sw-req
    title: "P1: 0 <= count <= limit (always)"
    status: approved
    description: >
      The semaphore count is always between 0 and limit inclusive.
      This is the fundamental invariant — it must hold after init, give,
      take, reset, and any interleaving of operations.
    tags: [sem, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures/invariant clause. Proptest random op sequences.
        Integration tests for init, give, take boundaries.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-2
      - type: satisfies
        target: ZEP-SRS-5-4
      - type: satisfies
        target: ZEP-SRS-5-5
      - type: satisfies
        target: ZEP-SRS-5-15

  - id: SWREQ-SEM-P02
    type: sw-req
    title: "P2: limit > 0 (always)"
    status: approved
    description: >
      The semaphore limit is always strictly positive.
      Enforced by init rejecting limit == 0 with -EINVAL.
    tags: [sem, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus requires clause on init. Unit test for zero limit rejection.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-18

  - id: SWREQ-SEM-P03
    type: sw-req
    title: "P3: give with no waiters increments count, capped at limit"
    status: approved
    description: >
      When give is called and the wait queue is empty:
      if count < limit, count increments by 1 (GiveResult::Incremented).
      If count == limit, count is unchanged (GiveResult::Saturated).
      Maps to z_impl_k_sem_give lines 109-111 in kernel/sem.c.
    tags: [sem, give, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on give(). Unit tests for increment and saturation.
        Proptest gives_saturate_at_limit.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-12
      - type: satisfies
        target: ZEP-SRS-5-13

  - id: SWREQ-SEM-P04
    type: sw-req
    title: "P4: give with waiters wakes highest-priority thread, count unchanged"
    status: approved
    description: >
      When give is called and the wait queue is non-empty, the
      highest-priority (numerically lowest) waiting thread is woken with
      return value 0 (OK).  The count does not change.
      Maps to z_impl_k_sem_give lines 103-108 in kernel/sem.c.
    tags: [sem, give, wake, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on give(). Integration test give_wakes_highest_priority_thread.
        Wait queue ordering test.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-14

  - id: SWREQ-SEM-P05
    type: sw-req
    title: "P5: take when count > 0 decrements by exactly 1"
    status: approved
    description: >
      When take is called and count > 0, count decrements by 1 and
      returns 0 (OK).
      Maps to z_impl_k_sem_take lines 143-148 in kernel/sem.c.
    tags: [sem, take, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on try_take(). Unit test take_decrements_by_one.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-6
      - type: satisfies
        target: ZEP-SRS-5-7

  - id: SWREQ-SEM-P06
    type: sw-req
    title: "P6: take when count == 0, no wait, returns -EBUSY"
    status: approved
    description: >
      When take is called with K_NO_WAIT and count == 0, returns -EBUSY
      without modifying the semaphore.
      Maps to z_impl_k_sem_take lines 150-154 in kernel/sem.c.
    tags: [sem, take, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on try_take(). Unit test take_empty_returns_ebusy.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-11

  - id: SWREQ-SEM-P07
    type: sw-req
    title: "P7: take when count == 0, with wait, blocks calling thread"
    status: approved
    description: >
      When take is called with a timeout and count == 0, the calling
      thread is blocked and inserted into the wait queue in priority order.
      Maps to z_impl_k_sem_take line 158 (z_pend_curr) in kernel/sem.c.
    tags: [sem, take, blocking, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on take_blocking(). Unit test take_blocking_enqueues_thread.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-8

  - id: SWREQ-SEM-P08
    type: sw-req
    title: "P8: reset sets count to 0, wakes all waiters with -EAGAIN"
    status: approved
    description: >
      Reset clears count to 0 and wakes every waiting thread with
      return value -EAGAIN.  Returns the number of threads woken.
      Maps to z_impl_k_sem_reset lines 166-192 in kernel/sem.c.
    tags: [sem, reset, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on reset(). Integration test reset_clears_everything.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-16
      - type: satisfies
        target: ZEP-SRS-5-17

  - id: SWREQ-SEM-P09
    type: sw-req
    title: "P9: no arithmetic overflow in any operation"
    status: approved
    description: >
      No arithmetic operation on count or limit causes integer overflow
      or underflow.  Give at limit saturates; take at 0 returns error.
      The C code uses (count != limit) ? 1U : 0U pattern (line 110).
      Gale uses checked_add/saturating_sub.
    tags: [sem, safety, overflow, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus overflow-free proof. Miri UB detection. Clippy
        arithmetic_side_effects lint (deny). Integration test
        no_overflow_at_u32_max_limit.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001

  - id: SWREQ-SEM-P10
    type: sw-req
    title: "P10: wait queue ordering preserved across all operations"
    status: approved
    description: >
      The wait queue maintains priority ordering (numerically lowest
      priority value = highest priority) at all times.  Threads are
      woken strictly in priority order.
    tags: [sem, wait-queue, ordering, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus sorted-invariant on WaitQueue. Integration test
        wait_queue_ordering_across_operations. Unit test
        pend_maintains_priority_order.
    links:
      - type: derives-from
        target: SYSREQ-SEM-001
      - type: satisfies
        target: ZEP-SRS-5-14

  # ── Mutex: System requirement ─────────────────────────────────────────────

  - id: SYSREQ-MUT-001
    type: system-req
    title: Reentrant mutex with ownership tracking
    status: approved
    description: >
      A reentrant mutex that matches the Zephyr k_mutex API semantics:
      initialization, lock (reentrant), unlock with ownership checks,
      and priority-ordered wait queue for blocked threads.  Must maintain
      the owner/lock_count correspondence invariant and never exhibit
      undefined behavior or arithmetic overflow.
    tags: [mutex, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 11 properties (M1-M11) verified by Verus SMT proofs,
        Rocq theorem proofs, and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001

  # ── Mutex: Software requirements (11 ASIL-D properties) ──────────────────

  - id: SWREQ-MUT-M01
    type: sw-req
    title: "M1: lock_count > 0 iff owner.is_some() (always)"
    status: approved
    description: >
      The fundamental mutex invariant: the lock count is positive if and only
      if the mutex has an owner.  This must hold after init, lock, unlock,
      and any interleaving of operations.
    tags: [mutex, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus biconditional in inv(). Integration tests m1_invariant_*.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M02
    type: sw-req
    title: "M2: wait_q non-empty implies mutex is locked (always)"
    status: approved
    description: >
      Waiters can only exist when the mutex is locked.  An unlocked mutex
      always has an empty wait queue.
    tags: [mutex, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus implication in inv(). Integration test m2_waiters_implies_locked.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M03
    type: sw-req
    title: "M3: try_lock when unlocked sets owner, lock_count = 1"
    status: approved
    description: >
      When try_lock is called on an unlocked mutex, the caller becomes the
      owner and lock_count is set to 1.
      Maps to z_impl_k_mutex_lock lines 121-131 in kernel/mutex.c.
    tags: [mutex, lock, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on try_lock(). Integration test m3_lock_unlocked_mutex.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M04
    type: sw-req
    title: "M4: try_lock by same owner increments lock_count (reentrant)"
    status: approved
    description: >
      When try_lock is called by the current owner, lock_count is incremented.
      The owner remains the same.
      Maps to z_impl_k_mutex_lock line 129 in kernel/mutex.c.
    tags: [mutex, lock, reentrant, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on try_lock(). Integration test m4_reentrant_lock.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M05
    type: sw-req
    title: "M5: try_lock by different thread returns WouldBlock"
    status: approved
    description: >
      When try_lock is called by a thread other than the owner, it returns
      WouldBlock without modifying the mutex state.
      Maps to z_impl_k_mutex_lock line 148 in kernel/mutex.c.
    tags: [mutex, lock, contention, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on try_lock(). Integration test m5_lock_contention.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M06
    type: sw-req
    title: "M6: unlock by non-owner returns error (EINVAL/EPERM)"
    status: approved
    description: >
      Unlocking a mutex that is not locked returns -EINVAL.  Unlocking a
      mutex owned by a different thread returns -EPERM.  In both cases,
      the mutex state is unchanged.
      Maps to z_impl_k_mutex_unlock lines 238-250 in kernel/mutex.c.
    tags: [mutex, unlock, error, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on unlock(). Integration tests m6a/m6b_unlock_not_*.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M07
    type: sw-req
    title: "M7: unlock when lock_count > 1 decrements count, owner unchanged"
    status: approved
    description: >
      When unlock is called by the owner and lock_count > 1, the count
      is decremented and the owner remains the same (reentrant release).
      Maps to z_impl_k_mutex_unlock lines 266-269 in kernel/mutex.c.
    tags: [mutex, unlock, reentrant, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on unlock(). Integration test m7_reentrant_unlock.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M08
    type: sw-req
    title: "M8: unlock with waiters transfers ownership to highest-priority"
    status: approved
    description: >
      When unlock is called by the owner and lock_count == 1 with waiters
      present, ownership is transferred to the highest-priority waiting
      thread.  lock_count stays at 1, the waiter is woken with return
      value 0 (OK).
      Maps to z_impl_k_mutex_unlock lines 278-296 in kernel/mutex.c.
    tags: [mutex, unlock, transfer, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on unlock(). Integration test m8_ownership_transfer.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M09
    type: sw-req
    title: "M9: unlock with no waiters fully unlocks (count=0, owner=None)"
    status: approved
    description: >
      When unlock is called by the owner and lock_count == 1 with no
      waiters, the mutex is fully unlocked: owner cleared to None and
      lock_count set to 0.
      Maps to z_impl_k_mutex_unlock lines 297-299 in kernel/mutex.c.
    tags: [mutex, unlock, full-release, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on unlock(). Integration test m9_full_unlock.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M10
    type: sw-req
    title: "M10: no arithmetic overflow in lock_count"
    status: approved
    description: >
      No arithmetic operation on lock_count causes integer overflow.
      The Verus code requires lock_count < u32::MAX as precondition.
      The plain code uses checked_add.
    tags: [mutex, safety, overflow, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus overflow-free proof (requires clause). Integration test
        m10_no_overflow. Clippy arithmetic_side_effects lint.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  - id: SWREQ-MUT-M11
    type: sw-req
    title: "M11: wait queue ordering preserved across all operations"
    status: approved
    description: >
      The wait queue maintains priority ordering at all times.  Threads
      waiting on the mutex are unblocked strictly in priority order
      (numerically lowest value first).
    tags: [mutex, wait-queue, ordering, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus sorted-invariant via WaitQueue::inv(). Integration test
        m11_priority_ordering.
    links:
      - type: derives-from
        target: SYSREQ-MUT-001

  # ── CondVar: System requirement ──────────────────────────────────────────

  - id: SYSREQ-CV-001
    type: system-req
    title: Condition variable with signal/broadcast/wait
    status: approved
    description: >
      A condition variable that matches the Zephyr k_condvar API semantics:
      initialization, signal (wake one), broadcast (wake all), and wait
      (block on condition).  Must maintain priority-ordered wait queue
      and never exhibit undefined behavior or arithmetic overflow.
    tags: [condvar, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 8 properties (C1-C8) verified by Verus SMT proofs
        and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001

  # ── CondVar: Software requirements (8 ASIL-D properties) ────────────────

  - id: SWREQ-CV-C01
    type: sw-req
    title: "C1: after init, wait queue is empty"
    status: approved
    description: >
      After initialization, the condition variable's wait queue has
      zero entries and the invariant holds.
      Maps to condvar.c:21-30.
    tags: [condvar, init, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on init(). Unit test condvar_init_empty.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C02
    type: sw-req
    title: "C2: signal wakes at most one waiter (highest priority)"
    status: approved
    description: >
      When signal is called and the wait queue is non-empty, exactly
      one thread (the highest-priority waiter) is woken and the wait
      queue length decreases by 1.
      Maps to condvar.c:44-61.
    tags: [condvar, signal, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on signal(). Integration test signal_wakes_one.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C03
    type: sw-req
    title: "C3: signal on empty condvar is a no-op"
    status: approved
    description: >
      When signal is called and the wait queue is empty, the condvar
      state is unchanged.
      Maps to condvar.c:44-61.
    tags: [condvar, signal, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on signal(). Unit test signal_empty_noop.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C04
    type: sw-req
    title: "C4: broadcast wakes all waiters, returns woken count"
    status: approved
    description: >
      Broadcast clears the wait queue entirely and returns the number
      of threads woken, equal to the previous queue length.
      Maps to condvar.c:73-96.
    tags: [condvar, broadcast, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on broadcast(). Integration test broadcast_wakes_all.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C05
    type: sw-req
    title: "C5: broadcast on empty condvar returns 0"
    status: approved
    description: >
      When broadcast is called on an empty wait queue, zero threads
      are woken and the condvar state is unchanged.
      Maps to condvar.c:73-96.
    tags: [condvar, broadcast, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on broadcast(). Unit test broadcast_empty_returns_zero.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C06
    type: sw-req
    title: "C6: wait adds thread to wait queue (blocking path)"
    status: approved
    description: >
      When wait_blocking is called, the thread is blocked and inserted
      into the wait queue in priority order.  Queue length increases by 1.
      Maps to condvar.c:99-121.
    tags: [condvar, wait, blocking, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus ensures on wait_blocking(). Unit test wait_enqueues_thread.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C07
    type: sw-req
    title: "C7: signal/broadcast preserve wait queue ordering"
    status: approved
    description: >
      After signal or broadcast, the condvar invariant (wait queue
      sorted by priority) is maintained.
      Maps to condvar.c:44-96.
    tags: [condvar, wait-queue, ordering, asil-d]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        Verus inv() maintained across signal/broadcast.
        Integration test ordering_preserved.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  - id: SWREQ-CV-C08
    type: sw-req
    title: "C8: no arithmetic overflow in broadcast woken count"
    status: approved
    description: >
      The broadcast woken count cannot overflow because it is bounded
      by MAX_WAITERS (64), which fits in u32.
    tags: [condvar, safety, overflow, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus bounded proof (woken <= 64). Clippy arithmetic_side_effects lint.
    links:
      - type: derives-from
        target: SYSREQ-CV-001

  # ── MsgQ: System requirement ─────────────────────────────────────────────

  - id: SYSREQ-MQ-001
    type: system-req
    title: Message queue with ring buffer semantics
    status: approved
    description: >
      A message queue that matches the Zephyr k_msgq API semantics:
      initialization, put (enqueue), put_front (priority enqueue),
      get (dequeue), peek, and purge.  Must maintain ring buffer index
      consistency and never exhibit undefined behavior or arithmetic overflow.
    tags: [msgq, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 13 properties (MQ1-MQ13) verified by Verus SMT proofs
        and runtime test suites.
    links:
      - type: derives-from
        target: STKH-001

  # ── MsgQ: Software requirements (13 ASIL-D properties) ──────────────────

  - id: SWREQ-MQ-MQ01
    type: sw-req
    title: "MQ1: 0 <= used_msgs <= max_msgs (capacity invariant)"
    status: approved
    description: >
      The message count is always between 0 and max_msgs inclusive.
      This is the fundamental invariant maintained across all operations.
      Maps to msg_q.c:43-470.
    tags: [msgq, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus ensures/invariant on all methods. Proptest random op sequences.
    links:
      - type: derives-from
        target: SYSREQ-MQ-001

  - id: SWREQ-MQ-MQ02
    type: sw-req
    title: "MQ2: read_idx < max_msgs (index bounds)"
    status: approved
    description: >
      The read index is always strictly less than max_msgs, ensuring
      valid ring buffer access.
      Maps to msg_q.c:43-470.
    tags: [msgq, invariant, asil-d]
    fields:
      req-type: safety
      priority: must
      verification-criteria: >
        Verus invariant on all methods.
    links:
      - type: derives-from
        target: SYSREQ-MQ-001

  - id: SWREQ-MQ-MQ03
    type: sw-req
