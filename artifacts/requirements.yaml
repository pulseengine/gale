      post (OR bits), set (replace), clear (AND complement), set_masked
      (selective update), wait_any (any bit match), and wait_all (all bits
      match).  Must maintain valid bitmask and never exhibit undefined
      behavior or arithmetic overflow.
    tags: [event, kernel]
    fields:
      req-type: functional
      priority: must
      verification-criteria: >
        All 8 properties (EV1-EV8) verified by Verus SMT proofs
        and runtime test suites.
