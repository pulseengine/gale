# gust outer partition-switch FSM (safety line v0.6.0) — the verified OUTER
# scheduler policy core for two-level time partitioning (ARINC-653-style major
# frame), sitting above the v1 cooperative inner executor (REQ-OS-EXEC-001).
# src/partition_switch.rs (Verus + Kani); the timer tick and the context
# save / region-program / resume are trusted seams — the POLICY (boundary
# detection, phase ordering, window sequencing) is what is verified.
artifacts:
  # ---------------------------------------------------------------- requirements
  - id: REQ-OS-SWITCH-001
    type: sw-req
    title: "gust outer partition-switch FSM (window-end preemption, major frame)"
    status: implemented
    release: v0.6.0
    description: >
      The gust:os outer scheduler SHALL time-partition execution over a static
      major frame of MAX_WINDOWS (4) windows that exactly covers [0, frame_len)
      with no gap and no overlap (every tick maps to exactly one window), and
      SHALL guarantee: (1) NON-MASKABLE window-end preemption — at the last
      tick of the current window the switch FSM transitions Running -> SaveCtx
      unconditionally (no disable path exists; the boundary guard lives in the
      executable body, not a strippable precondition); (2) region-swap-before-
      resume ordering at the FSM level — the one-way pipeline SaveCtx ->
      ProgramRegions -> Resume -> Running admits Resume only after the
      mark_swapped edge (swapped ledger bit, cleared on every preemption edge,
      set only by mark_swapped), so mark_swapped strictly precedes
      mark_resumed on every switch; (3) no-skip window sequencing — each
      completed switch advances the window index by exactly one (mod
      MAX_WINDOWS), following the frame with no window skipped or repeated.
      The context save, memory-protection region programming, and context
      resume are trusted FFI seams (ctx_save / region_swap / ctx_resume) with
      no ensures — no proof leans on hardware behavior — and the binding of
      the region_swap seam call to the mark_swapped edge is trusted code order
      in run_switch's body (honest scoping: the FSM ordering is machine-
      checked; the seam-call-to-ledger-bit binding is not). The verified core
      is scalar-only (no async/closures/trait objects, per the intersection
      rule) and builds against the region_swap contract only; I-ISO
      integration wires it to the isolation core's partition programmer.
    tags: [gust, os, scheduler, partition, arinc-653, preemption, verified]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-EXEC-001
      - type: related-to
        target: REQ-OS-MPU-001

  # ------------------------------------------------------------- verification
  - id: VER-OS-SWITCH-001
    type: sw-verification
    title: "Verus proofs + Kani cross-check for the partition-switch FSM"
    method: formal-verification
    status: verified
    description: >
      Two-track evidence for REQ-OS-SWITCH-001, both against the SAME source
      (no Rocq track for this module — scope is Verus + Kani): (1) Verus
      (SMT/Z3) over src/partition_switch.rs — 1095 verified / 0 errors at
      branch head (bazel //:verus_test; +14 exact over the 1081 main
      baseline): S1 non-maskability as a total tick postcondition over every
      phase/input conditioned only on inv(); S2 as a state invariant
      (Resume ==> swapped, SaveCtx/ProgramRegions ==> !swapped, plus
      lemma_resume_implies_region_swap); S3 via mark_resumed's advance-by-
      exactly-one ensures + lemma_no_skip; current_window containment AND
      forall-uniqueness (exact coverage); boundary compare overflow/underflow
      discharged. No assume/admit; #[verifier::external_body] only on the
      three seam wrappers, which carry no ensures. (2) cargo kani over the
      verus-strip'd plain/src/partition_switch.rs (the SAME shipped executable
      code; tools/verus-strip/tests/gate.rs enforces convergence, 2/2):
      k1_nonmaskable_boundary (fires at boundary AND never off it),
      k2_resume_only_via_program_regions (single-step inv preservation +
      only-entry-edge), k3_frame_covers_exactly_one (brute-force coverage +
      frame_inv satisfiability, non-vacuous), k4_no_skip_advances_by_one
      (full boundary->switch replay) — all VERIFICATION SUCCESSFUL
      (87/145/209/178 checks, 0 failed). Scoping: the FSM ordering is what is
      machine-checked; the binding of the seam calls to the mark_* edges is
      trusted code order in run_switch, and system-level non-maskability
      additionally assumes the trusted tick source delivers the boundary tick
      and the switch pipeline completes before the next boundary.
    tags: [gust, os, partition, switch, verus, kani, verified]
    links:
      - type: verifies
        target: REQ-OS-SWITCH-001
