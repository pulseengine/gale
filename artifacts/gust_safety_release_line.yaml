# gust safety release line — the load-bearing build (BUILD path, gale#63).
#
# Maps docs/superpowers/plans/2026-07-15-gust-safety-release-line.md into typed
# rivet artifacts so the release line executes against tracked requirements
# rather than a prose plan. The build-vs-host fork is resolved to BUILD:
# verified all the way down, no outside dependency, checkable certificates at
# every layer (codegen / isolation / timing / proof-obligations). Critical
# path: v0.4.0 syscall seam (REQ-OS-SYSCALL-001, already tracked) -> v0.5.0
# I-ISO MPU/MMU region-swap (the KEYSTONE) -> v0.6.0 outer preemptive switch
# -> v0.7.0 value-domain Health Monitor -> v1.0 closed safety case, with
# cross-cutting tracks T1 (tri-track completion), T2 (object-code
# verification), T3 (spar schedulability bridge) and T4 (sound static-WCET)
# threading across the critical path. Everything here is `status: proposed`
# (planned work, not yet built); this file records WHAT must close its V for
# each release to be cuttable, not that it has closed.
#
# Reuses (via related-to, not redefined): REQ-OS-SYSCALL-001, REQ-OS-MPU-001,
# REQ-OS-EXEC-001 / VER-OS-EXEC-001, REQ-OS-MULTITENANT-001,
# REQ-OS-RELEASE-001, SYSREQ-BYOOS-001 (the anchor every req below derives
# from).

artifacts:
  # ==========================================================================
  # The resolved build-vs-host decision — the premise the whole line stands on
  # ==========================================================================

  - id: DD-OS-BUILD-001
    type: sw-detail-design
    title: "Build the verified outer, not host on a certified kernel (the build-vs-host fork, resolved)"
    status: proposed
    description: >
      Records the resolved build-vs-host fork (gale#63 spec §12): gust BUILDS
      the outer preemptive partition switch, the MPU/MMU region-swap, and the
      Health-Monitor core as gale's own tiny verified sliver, rather than
      hosting the two-level partition model on an externally-certified
      partitioning kernel. The load-bearing argument for BUILD is checkable
      certificates at every layer of the stack, not any single piece:
      codegen (per-rule and binary-translation object-code verification),
      isolation (the I-ISO invariant — a hardware memory-protection boundary
      contains the compiler), timing (a machine-checked schedulability
      bound), and proof-obligations (LRAT-certified discharge of the SMT
      leaves). Each layer is an untrusted-fast-tool paired with a small
      trusted checker; that symmetry — not any one proof — is what makes
      "we do it and we control it" a safety argument rather than a slogan,
      and keeps no unverifiable third-party blob in the TCB. This decision
      is the premise every requirement in the safety release line below
      builds on: it is why the isolation keystone (REQ-OS-ISO-001), the
      outer switch (REQ-OS-SWITCH-001), and the value-domain Health Monitor
      (REQ-OS-HM-001) are gale-authored and gale-verified rather than
      integration points onto someone else's certified kernel.
    tags: [gust, os, decision, build-vs-host, safety, gale63]
    links:
      - type: refines
        target: SAC-BYOOS-SCAFFOLD
      - type: related-to
        target: REQ-OS-RELEASE-001

  # ==========================================================================
  # v0.5.0 — I-ISO core: verified MPU/MMU region-swap (THE KEYSTONE)
  # ==========================================================================

  - id: REQ-OS-ISO-001
    type: sw-req
    title: "I-ISO: the hardware memory-protection boundary is the SOLE isolation root of trust (the keystone)"
    status: implemented
    release: v0.5.0
    description: >
      This is the release-line KEYSTONE (invariant I-ISO): the target's
      hardware memory-protection facility (an ARMv7-M/ARMv8-M MPU region
      table, an AArch64 MMU with exception-level separation, or a RISC-V
      PMP), programmed by the verified core on entry to a partition, SHALL
      be the sole isolation root of trust for the two-level partition model.
      The Component-Model / dissolve layer provides ergonomics and
      portability ONLY — it is never the isolation boundary. Concretely: the
      region-table + program_regions_on_switch SHALL be an mmio/scalar-FSM
      sliver (thin-seam discipline, no new TCB shape); the programmed
      regions SHALL be disjoint, SHALL cover exactly the partition granted
      to the entering component, and SHALL deny everything else
      (deny-by-default). Consequence: a synth/meld/loom miscompile can
      corrupt data only WITHIN the partition it targets, never across a
      partition boundary — because the boundary is enforced by hardware the
      compiler does not control. This is the first release in the line to
      deliver ANY isolation/safety evidence; everything shipped before it
      (the inner executor, the ten thin-seam drivers) is functional-only
      evidence (see the plan's two-column ledger). The ARMv7-M MPU
      instantiation lands first; the AArch64 MMU+EL path is scoped but not
      required for this release.
    tags: [gust, os, isolation, mpu, mmu, i-iso, keystone, safety, gale63]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-MPU-001
      - type: related-to
        target: DD-OS-BUILD-001

  - id: VER-OS-ISO-001
    type: sw-verification
    title: "Verus/Kani region-program FSM + fault-injection + the synth#757 containment demo"
    method: formal-verification
    status: verified
    release: v0.5.0
    description: >
      Multi-part evidence for REQ-OS-ISO-001, all against the same
      region-program source (src/mpu_switch.rs, Verus 1159 verified / 0
      errors + Kani): (1) Verus and Kani proofs over the region-program
      FSM establishing disjointness (no two programmed regions overlap),
      totality (every entering partition gets a fully programmed region set
      before it resumes), and deny-by-default (any address not covered by
      the entering partition's regions is denied by construction, not by
      omission) — strengthened by the verified table BUILDER
      (RegionTable::try_add_region, machine-checked to PRESERVE table_inv on
      every path, + covers/covers_addr grant predicate; a caller building
      exclusively through new()+try_add_region cannot construct an
      isolation-violating table). (2) A qemu fault-injection oracle
      (benches/gust/src/bin/gust_iso_fault_probe.rs, lm3s6965evb v7-M PMSA
      MPU pre-verified by mpu_spike.rs): a cross-region write from inside a
      partition takes a REAL MemManage fault (CFSR=0x00000082
      DACCVIOL+MMARVALID) — handler-flag-gated, non-vacuous (granting the
      hole flips it to FAIL) — rather than silently corrupting a sibling.
      (3) The flagship acceptance test — the synth#757 containment demo
      (gust_iso_contain_probe.rs + no-fault control gust_iso_contain_ctl.rs):
      the EXACT archived synth#757 miscompile (os-tl-buggy.o, one wrong
      R_ARM_ABS32 relocation) has its stale head-chunk read physically
      DENIED at MMFAR==0x2000bff8 by the MPU programmed through the verified
      switch_to_partition, 0 bytes reaching the log sink; the fixed-object
      control runs clean under the identical map, pinning containment to the
      miscompiled read. SCOPE: fault-containment (an accidental compiler
      miscompile), not security-containment (the demo tenant runs privileged
      and the PPB is not MPU-checked); evidence is local qemu, not yet
      CI-gated — silicon + CI gating are v0.5.x follow-ons. Kill-criterion: a
      Kani/Verus harness fails, a crafted cross-region access does NOT fault,
      or the containment demo's miscompiled read is NOT denied.
    tags: [gust, os, isolation, mpu, verus, kani, renode, synth757, verified]
    links:
      - type: verifies
        target: REQ-OS-ISO-001

  # ==========================================================================
  # v0.6.0 — Outer preemptive partition switch (ARINC-653-class backbone)
  # ==========================================================================

  - id: REQ-OS-SWITCH-001
    type: sw-req
    title: "Outer fixed-priority time-partitioned preemptive switch + per-partition region-swap"
    status: implemented
    release: v0.6.0
    description: >
      The outer scheduler SHALL provide fixed-priority, time-partitioned,
      preemptive switching across N partitions on an offline-planned major
      frame, combining two independent guarantees: TEMPORAL isolation — a
      non-maskable window-end preemption that inner (partition-local) code
      cannot defer, mask, or extend — and SPATIAL isolation — the
      per-partition MPU/MMU region-swap (REQ-OS-ISO-001) ordered strictly
      before the entering partition's inner scheduler is resumed, so no
      instruction of the new partition ever executes under the old
      partition's memory map. gale contributes the PROOF that this
      particular switch implementation has these properties; it explicitly
      ADOPTS the mechanism from established static-partitioning
      hypervisor/ARINC-653-class patterns rather than inventing a novel
      scheduling algorithm — the load-bearing claim of this requirement is
      verification, not novelty. Scope for this release includes
      multi-partition-per-core placement (e.g. a flight-control partition
      and a mission partition sharing one core, an estimator partition on a
      second core) and the multi-core mapping wired into the Renode model.
    tags: [gust, os, scheduler, partition-switch, temporal, spatial, arinc653, safety, gale63]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-ISO-001
      - type: related-to
        target: REQ-OS-EXEC-001
      - type: related-to
        target: DD-OS-BUILD-001

  - id: VER-OS-SWITCH-001
    type: sw-verification
    title: "Verus/Kani on the outer switch (un-maskable window-end preemption, ordered region-swap) + multi-partition Renode demo"
    method: formal-verification
    status: implemented
    release: v0.6.0
    description: >
      Verus and Kani proofs over the outer switch core establish: (1)
      window-end preemption fires unconditionally at the planned major-frame
      boundary regardless of what the currently-running partition's inner
      scheduler does — inner code has no code path that can mask, defer, or
      extend its allotted window; (2) the per-partition region-swap
      (REQ-OS-ISO-001's region-program FSM) is always fully applied BEFORE
      the entering partition's first instruction executes, i.e. the switch
      is temporally ordered spatial-isolation-then-resume with no window in
      which the wrong memory map is live. End-to-end: a multi-partition
      demo on the Renode multi-core model exercising at least three
      partitions across the planned major frame, confirming each partition
      only ever executes within its own window and its own memory map.
      Schedulability of the inner tasks under this outer supply is closed
      separately by track T3 (REQ-OS-SCHED-001). Kill-criterion: a
      Verus/Kani harness fails, a partition's window is observed to run
      past its planned boundary, or the region-swap is observed applied
      after the entering partition has already resumed.
      DELIVERED (2026-07-16, status implemented): part (1) FULLY — Verus
      1095/0 + Kani 4/4 over the outer switch FSM (src/partition_switch.rs,
      #187): window disjointness/no-skip, un-maskable boundary detection,
      and lemma_resume_implies_region_swap (Resume reachable only through
      ProgramRegions ⇒ region-swap strictly precedes resume). AND part (2)
      CORE — a single-core qemu (lm3s6965evb, real ARMv7-M PMSA MPU)
      demonstrator (benches/gust/src/bin/gust_switch_probe.rs) driving the
      VERIFIED gale::partition_switch::Switcher across a 3-partition major
      frame (windows P0→P1→P2→P0): each partition writes its OWN scratch
      (no fault) and every cross-partition write is DENIED by a real
      MemManage fault (CFSR=0x82 DACCVIOL+MMARVALID, MMFAR == the exact
      neighbour address), the MPU programmed ONLY through the verified
      switch_to_partition, region-swap-before-resume OBSERVED via RBAR
      readback, plus an in-probe non-vacuity control (P0 denied in P1's
      window). Adversarially reviewed 0-critical incl. neuter tests
      (no-op the switch ⇒ oracle FLIPS TO FAIL, confirmed) — the
      confinement is attributable to the verified switch, not the layout.
      REMAINING for `verified`: the multi-CORE Renode placement demo (a
      second core / estimator partition wired into the Renode model) — this
      adds deployment/integration breadth, NOT a new verification property;
      scoped as a v0.6.x follow-on. Evidence to date is local qemu, not yet
      CI-gated.
    tags: [gust, os, scheduler, partition-switch, verus, kani, renode, verified]
    links:
      - type: verifies
        target: REQ-OS-SWITCH-001

  # ==========================================================================
  # v0.7.0 — Value-domain Health Monitor + failsafe state machine
  # ==========================================================================

  - id: REQ-OS-HM-001
    type: sw-req
    title: "Value-domain Health Monitor + failsafe state machine (erroneous-but-timely detection)"
    status: implemented
    release: v0.7.0
    description: >
      The Health Monitor SHALL detect the dominant real-world loss mode —
      output that is ERRONEOUS BUT TIMELY, not merely late or absent — via
      explicit value-domain detectors: data freshness/staleness checks,
      plausibility and innovation gating against a physical/estimator
      model, cross-sensor voting, and estimator-divergence detection. This
      SHALL be paired with an explicit failsafe state machine covering, at
      minimum: loss of the remote-control link, loss of the telemetry/
      datalink, loss of GPS or estimator convergence, geofence breach, and
      low-battery/power-budget exhaustion, each mapping onto the existing
      independent cross-core monitor tier (the F100 Health-Monitor tier
      already demonstrated as a hardware-independent backstop). The
      escalation ladder from a single detector trip to the terminal
      failsafe action SHALL be provably terminating (no detector
      combination can leave the system oscillating between states without
      reaching a defined terminal action). The design SHALL state a
      diagnostic-coverage figure against a named fault model, not merely
      assert coverage qualitatively.
    tags: [gust, os, health-monitor, failsafe, value-domain, safety, gale63]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-SWITCH-001
      - type: related-to
        target: DD-OS-BUILD-001

  - id: VER-OS-HM-001
    type: sw-verification
    title: "Verus/Kani on the HM/failsafe FSM + per-trigger fault-injection + diagnostic-coverage figure"
    method: formal-verification
    status: proposed
    release: v0.7.0
    description: >
      Verus and Kani proofs over the Health-Monitor/failsafe state machine
      establish that the escalation ladder is total (every reachable state
      has a defined transition for every detector event) and terminating
      (no cycle exists that avoids the terminal failsafe action once its
      trigger condition holds). End-to-end: a fault-injection demo exercises
      each named failsafe trigger (RC-loss, datalink-loss, GPS/estimator-
      loss, geofence, low-battery) independently and confirms the system
      reaches the correct terminal state within the modelled detection
      latency, plus a stated diagnostic-coverage figure computed against
      the named fault model in REQ-OS-HM-001. Kill-criterion: a Verus/Kani
      harness fails, an injected fault does not reach its mapped failsafe
      state, or the escalation ladder is observed to cycle without
      reaching a terminal action.
    tags: [gust, os, health-monitor, failsafe, verus, kani, fault-injection, verified]
    links:
      - type: verifies
        target: REQ-OS-HM-001

