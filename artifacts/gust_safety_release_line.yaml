    type: sw-verification
    title: "Lean-verified jittered WCRT recurrence + cooperative blocking term + demand-vs-supply cap, on the shipped executor"
    method: formal-verification
    status: proposed
    release: v0.6.0
    description: >
      Evidence for REQ-OS-SCHED-001: the Lean-verified worst-case-response-
