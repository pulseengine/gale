  # ==========================================================================
  # Track T4 — sound static-WCET inputs (cross-cutting; gates every timing claim)
  # ==========================================================================

  - id: REQ-OS-WCET-001
    type: sw-req
    title: "T4: sound static-WCET inputs, gale-owned — no partition budget sized from raw DWT high-water-marks"
    status: proposed
    release: v0.6.0
    description: >
      Cross-cutting track T4. The per-function cycle bound feeding the
      track-T3 schedulability analysis SHALL be a SOUND static bound, and
      on the BUILD (all-from-us) path the natural owner is gale's own
      compiler: since the compiler emits the exact instructions for a
      function, it SHALL also emit a sound per-function timing bound from
      its own instruction-timing model — a gale-owned static-WCET, not a
      third-party WCET tool integration. This is a BUILD GATE: no
      partition time budget may be sized directly from a raw cycle-counter
      high-water-mark; every budget SHALL trace to a sound static bound (or
      a recognized rigorous complement such as a measurement-based,
      sound-by-extreme-value-theory statistical WCET method used to
      cross-check the static bound — categorically above a raw high-water-
      mark, but not a substitute for the static bound as the primary
      input).
    tags: [gust, os, track-t4, wcet, timing, synth, safety, gale63]
    links:
