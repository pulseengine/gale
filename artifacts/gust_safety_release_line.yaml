  # ==========================================================================
  # Track T3 — compositional schedulability (cross-cutting; gates v0.6.0+)
  # ==========================================================================

  - id: REQ-OS-SCHED-001
    type: sw-req
    title: "T3: machine-checked compositional schedulability — inner response time bounded against the outer supply"
    status: proposed
    release: v0.6.0
    description: >
      Cross-cutting track T3. The inner tickless cooperative executor's
      worst-case response time, running under the outer partition's
      periodic-resource supply bound (REQ-OS-SWITCH-001), SHALL be bounded
      by a MACHINE-CHECKED (Lean-verified) analysis, not a measured
      high-water-mark. This SHALL derive the standard periodic-resource
      supply-bound blackout as the inner tasks' effective release jitter,
      feed it into a Lean-verified jittered worst-case-response-time
      recurrence, add the cooperative non-preemptive blocking term for the
      inner executor's run-to-completion polling model, and cap total
      demand against the supply bound function — producing a
      machine-checked inner-response bound that is provably sound at every
      poll/await point, not merely observed sound over a finite set of
      test runs. This is strictly stronger than the DWT-based high-water-
      mark evidence the project has relied on to date.
    tags: [gust, os, track-t3, schedulability, spar, lean, wcet, safety, gale63]
    links:
      - type: derives-from
        target: SYSREQ-BYOOS-001
      - type: related-to
        target: REQ-OS-EXEC-001
      - type: related-to
        target: REQ-OS-SWITCH-001
      - type: related-to
        target: DD-OS-BUILD-001

