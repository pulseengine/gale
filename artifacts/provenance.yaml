artifacts:
  - id: PROV-SEM-001
    type: source-provenance
    title: "Zephyr kernel/sem.c — counting semaphore implementation"
    status: approved
    description: >
      The primary C implementation of Zephyr's counting semaphore.
      Contains z_impl_k_sem_init, z_impl_k_sem_give, z_impl_k_sem_take,
      z_impl_k_sem_reset, plus userspace wrappers and poll event handling.
      Lines 45-192 contain the core logic; the rest is userspace verification,
      poll support, and OBJ_CORE infrastructure not in scope for Gale.
    tags: [upstream, sem, kernel]
    fields:
      upstream-project: zephyr
      upstream-version: "4.3.99-dev"
      upstream-file: kernel/sem.c
      upstream-sha256: "7731c241d90e49a93afaeeb35714ac3489a9ae165fb98b25d3b0e1cccf35c878"
      upstream-lines: 237
      upstream-functions:
        - "z_impl_k_sem_init (lines 45-73)"
        - "z_impl_k_sem_give (lines 95-121)"
        - "z_impl_k_sem_take (lines 132-164)"
        - "z_impl_k_sem_reset (lines 166-192)"
      gale-file: plain/src/sem.rs
      gale-module: gale::sem
      scope: partial-functions

