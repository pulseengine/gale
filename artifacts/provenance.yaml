  - id: PROV-WQ-001
    type: source-provenance
    title: "Zephyr kernel wait_q — priority-ordered wait queue"
    status: approved
    description: >
      Zephyr's _wait_q_t is a doubly-linked sorted list used by all
      blocking kernel objects.  The Gale port replaces the linked-list
      implementation with a heapless::Vec<Thread, 64> sorted array,
      preserving identical priority ordering semantics.
      The original is spread across multiple headers and kernel internals
      (include/zephyr/kernel_structs.h, kernel/include/wait_q.h).
    tags: [upstream, wait-queue, kernel]
    fields:
      upstream-project: zephyr
      upstream-version: "4.3.99-dev"
      upstream-file: kernel/include/wait_q.h
      upstream-sha256: "n/a — internal header, semantics ported not byte-for-byte"
      upstream-lines: 0
      upstream-functions:
        - "z_unpend_first_thread"
        - "z_pend_curr"
        - "z_waitq_init"
      gale-file: plain/src/wait_queue.rs
      gale-module: gale::wait_queue
      scope: full-file

