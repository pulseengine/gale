# Pre-commit hooks — mirrors Rust CI checks.
#
# Install: pre-commit install
#
# Runs the same checks as the Rust CI workflow (bazel-tests.yml):
#   1. cargo test (all workspace tests including differential)
#   2. clippy (deny warnings)
#   3. verus-strip gate (plain/ matches stripped src/)

repos:
  - repo: local
    hooks:
      - id: test
        name: cargo test
        entry: cargo test --workspace --quiet
        language: system
        pass_filenames: false
        files: '\.rs$|Cargo\.toml$'

      - id: clippy
        name: clippy -D warnings
        entry: cargo clippy --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: '\.rs$'

      - id: gate
        name: verus-strip gate
        entry: cargo test --manifest-path tools/verus-strip/Cargo.toml --test gate --quiet
        language: system
        pass_filenames: false
        files: '(^src/|^plain/)'
