# LLVM cross-language LTO: build Zephyr+Gale with Clang+lld, enabling
# link-time optimization across C and Rust boundaries.
#
# Strategy: Use Rust stable (LLVM 21) + install matching Clang 21 from
# apt.llvm.org. Picolibc fork (pulseengine/picolibc@gale/lld-lto-fix)
# adds -L to the build dir so ld.lld can re-resolve libc symbols after
# LTO codegen. CMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY skips the
# link step in CMake's toolchain detection (Clang 21 can compile ARM
# but can't link without the full sysroot).

name: LLVM Cross-Language LTO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: llvm-lto-${{ github.ref }}
  cancel-in-progress: true

# Container default shell is /bin/sh → dash on Ubuntu. Scripts in this
# workflow use bash features (here-strings `<<<`, brace-group
# redirection with arithmetic, `read` splitting). Make bash the default
# so those don't surface as "Syntax error: redirection unexpected".
defaults:
  run:
    shell: bash

env:
  HOME: /root
  DOCKER_CONFIG: /tmp/.docker

jobs:
  llvm-lto-build:
    name: "LLVM LTO build + size comparison"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust stable + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Install matching Clang + LLD
        run: |
          . /root/.cargo/env
          RUST_LLVM=$(rustc -vV | grep 'LLVM version' | grep -o '[0-9]*' | head -1)
          echo "Rust LLVM: ${RUST_LLVM}"
          apt-get install -y -qq wget lsb-release software-properties-common gnupg > /dev/null 2>&1
          wget -qO- https://apt.llvm.org/llvm.sh | bash -s -- "${RUST_LLVM}" all
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/llvm-size llvm-size /usr/bin/llvm-size-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-${RUST_LLVM} 200
          echo "Clang: $(clang --version | head -1)"
          echo "LLD: $(ld.lld --version | head -1)"

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          for attempt in 1 2 3; do west sdk install -t arm-zephyr-eabi && break || sleep 5; done

      - name: Setup SDK paths
        run: |
          SDK_DIR=$(find /root -maxdepth 1 -name 'zephyr-sdk-*' -type d 2>/dev/null | head -1)
          [ -z "${SDK_DIR}" ] && SDK_DIR=$(find /opt -maxdepth 2 -name 'zephyr-sdk-*' -type d 2>/dev/null | head -1)
          # SDK 1.0+ moved the GNU toolchain into a 'gnu' subdirectory.
          # Fall back to the flat layout for SDK <1.0 compatibility.
          if [ -d "${SDK_DIR}/gnu/arm-zephyr-eabi/bin" ]; then
            ARM_BIN="${SDK_DIR}/gnu/arm-zephyr-eabi"
          else
            ARM_BIN="${SDK_DIR}/arm-zephyr-eabi"
          fi
          GCC="${ARM_BIN}/bin/arm-zephyr-eabi-gcc"
          GCC_LIB_DIR=$(dirname $("${GCC}" -print-libgcc-file-name -mcpu=cortex-m3 -mthumb))
          PICOLIBC_DIR="${ARM_BIN}/arm-zephyr-eabi/lib/thumb/v7-m/nofp"
          echo "LLD_LIBS=-L${GCC_LIB_DIR} -L${PICOLIBC_DIR}" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${GCC_LIB_DIR}:${PICOLIBC_DIR}" >> "$GITHUB_ENV"
          echo "${ARM_BIN}/bin" >> "$GITHUB_PATH"
          echo "SDK: ${SDK_DIR}, GCC: ${GCC_LIB_DIR}"

      # --- Build 1: Baseline (GCC, stock Zephyr, no Gale) ---
      - name: "Build baseline (GCC, no Gale)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-gcc-baseline
          arm-zephyr-eabi-size build-gcc-baseline/zephyr/zephyr.elf | tee gcc-baseline-size.txt

      # --- Build 2: GCC + Gale ---
      - name: "Build GCC + Gale"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-gcc-gale \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          arm-zephyr-eabi-size build-gcc-gale/zephyr/zephyr.elf | tee gcc-gale-size.txt

      # --- Build 3: LLVM + Gale (no LTO) ---
      # Uses LTO overlay just for CONFIG_LLVM_USE_LLD=y (lld instead of bfd)
      - name: "Build LLVM + Gale (no LTO)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-llvm-gale \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf;${GALE_ROOT}/zephyr/gale_lto_overlay.conf" \
            -DCMAKE_EXE_LINKER_FLAGS="${LLD_LIBS}"
          llvm-size build-llvm-gale/zephyr/zephyr.elf 2>/dev/null \
            || arm-zephyr-eabi-size build-llvm-gale/zephyr/zephyr.elf \
            | tee llvm-gale-size.txt

      # --- Build 4: LLVM + Gale + cross-language LTO ---
      - name: "Build LLVM + Gale + LTO"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-llvm-lto \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf;${GALE_ROOT}/zephyr/gale_lto_overlay.conf" \
            -DCMAKE_EXE_LINKER_FLAGS="${LLD_LIBS}"
          llvm-size build-llvm-lto/zephyr/zephyr.elf 2>/dev/null \
            || arm-zephyr-eabi-size build-llvm-lto/zephyr/zephyr.elf \
            | tee llvm-lto-size.txt

      - name: "Run semaphore tests (LLVM+LTO)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          # QEMU may not be found by LLVM toolchain variant. Use SDK QEMU directly.
          SDK_DIR=$(find /root -maxdepth 1 -name 'zephyr-sdk-*' -type d 2>/dev/null | head -1)
          QEMU="${SDK_DIR}/sysroots/x86_64-pokysdk-linux/usr/bin/qemu-system-arm"
          if [ ! -f "${QEMU}" ]; then
            QEMU=$(which qemu-system-arm 2>/dev/null || echo "")
          fi
          if [ -n "${QEMU}" ]; then
            cd zephyr-workspace
            timeout 120 "${QEMU}" -cpu cortex-m3 -machine lm3s6965evb -nographic \
              -vga none -net none -icount shift=6,align=off,sleep=off \
              -rtc clock=vm -kernel build-llvm-lto/zephyr/zephyr.elf 2>&1 | tee test-llvm-lto.log &
            QEMU_PID=$!
            sleep 60 && kill ${QEMU_PID} 2>/dev/null || true
            wait ${QEMU_PID} 2>/dev/null || true
            if grep -q "PROJECT EXECUTION SUCCESSFUL" test-llvm-lto.log; then
              echo "PASS: LLVM+LTO semaphore tests"
            else
              echo "::warning::LLVM+LTO semaphore test did not produce PASS (may be QEMU issue)"
            fi
          else
            echo "::warning::QEMU not found, skipping runtime test"
          fi

      - name: "Check inlining + compare sizes"
        if: always()
        run: |
          cd zephyr-workspace
          echo "=== Symbol check ==="
          echo "--- GCC+Gale ---"
          arm-zephyr-eabi-nm build-gcc-gale/zephyr/zephyr.elf | grep -c gale_ || echo "0"
          echo "--- LLVM+LTO ---"
          (llvm-nm build-llvm-lto/zephyr/zephyr.elf 2>/dev/null || arm-zephyr-eabi-nm build-llvm-lto/zephyr/zephyr.elf) | grep -c gale_ || echo "0 (fully inlined)"

          echo ""
          parse_size() { tail -1 "$1" | awk '{print $1, $2, $3, $4}'; }
          read GCC_BL_TEXT GCC_BL_DATA GCC_BL_BSS GCC_BL_TOTAL <<< $(parse_size gcc-baseline-size.txt)
          read GCC_G_TEXT GCC_G_DATA GCC_G_BSS GCC_G_TOTAL <<< $(parse_size gcc-gale-size.txt)
          read LLVM_G_TEXT LLVM_G_DATA LLVM_G_BSS LLVM_G_TOTAL <<< $(parse_size llvm-gale-size.txt)
          read LTO_TEXT LTO_DATA LTO_BSS LTO_TOTAL <<< $(parse_size llvm-lto-size.txt)
          GALE_OVERHEAD=$((GCC_G_TOTAL - GCC_BL_TOTAL))
          LTO_VS_GCC=$((LTO_TOTAL - GCC_G_TOTAL))
          LTO_VS_BASELINE=$((LTO_TOTAL - GCC_BL_TOTAL))
          printf "%-25s %8s %8s %8s %8s\n" "Build" ".text" ".data" ".bss" "total"
          printf "%-25s %8d %8d %8d %8d\n" "GCC baseline" "$GCC_BL_TEXT" "$GCC_BL_DATA" "$GCC_BL_BSS" "$GCC_BL_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "GCC + Gale" "$GCC_G_TEXT" "$GCC_G_DATA" "$GCC_G_BSS" "$GCC_G_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "LLVM + Gale" "$LLVM_G_TEXT" "$LLVM_G_DATA" "$LLVM_G_BSS" "$LLVM_G_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "LLVM + Gale + LTO" "$LTO_TEXT" "$LTO_DATA" "$LTO_BSS" "$LTO_TOTAL"
          printf "\nGale overhead (GCC): %+d bytes\n" "$GALE_OVERHEAD"
          printf "LTO savings vs GCC+Gale: %+d bytes\n" "$LTO_VS_GCC"
          printf "LTO vs baseline (net): %+d bytes\n" "$LTO_VS_BASELINE"
          {
            echo "## LLVM Cross-Language LTO (LLVM 21)"
            echo "| Build | total |"
            echo "|-------|-------|"
            printf "| GCC baseline | %d |\n" "$GCC_BL_TOTAL"
            printf "| GCC + Gale | %d |\n" "$GCC_G_TOTAL"
            printf "| LLVM + Gale | %d |\n" "$LLVM_G_TOTAL"
            printf "| LLVM+LTO | %d |\n" "$LTO_TOTAL"
            printf "| **Net vs baseline** | **%+d** |\n" "$LTO_VS_BASELINE"
          } >> "$GITHUB_STEP_SUMMARY"

  llvm-lto-test:
    name: "llvm-lto-test"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - primitive: semaphore
            test_path: tests/kernel/semaphore/semaphore
          - primitive: mutex
            test_path: tests/kernel/mutex/mutex_api
          - primitive: msgq
            test_path: tests/kernel/msgq/msgq_api
          - primitive: stack
            test_path: tests/kernel/stack/stack
          - primitive: pipe
            test_path: tests/kernel/pipe/pipe_api
          - primitive: timer
            test_path: tests/kernel/timer/timer_api
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Set matrix env vars
        run: |
          echo "PRIMITIVE=${{ matrix.primitive }}" >> "$GITHUB_ENV"
          echo "TEST_PATH=${{ matrix.test_path }}" >> "$GITHUB_ENV"

      - name: Install Rust stable + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Install matching Clang + LLD
        run: |
          . /root/.cargo/env
          RUST_LLVM=$(rustc -vV | grep 'LLVM version' | grep -o '[0-9]*' | head -1)
          apt-get install -y -qq wget lsb-release software-properties-common gnupg > /dev/null 2>&1
          wget -qO- https://apt.llvm.org/llvm.sh | bash -s -- "${RUST_LLVM}" all
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${RUST_LLVM} 200
          update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${RUST_LLVM} 200

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          for attempt in 1 2 3; do west sdk install -t arm-zephyr-eabi && break || sleep 5; done

      - name: Setup SDK paths
        run: |
          SDK_DIR=$(find /root -maxdepth 1 -name 'zephyr-sdk-*' -type d 2>/dev/null | head -1)
          [ -z "${SDK_DIR}" ] && SDK_DIR=$(find /opt -maxdepth 2 -name 'zephyr-sdk-*' -type d 2>/dev/null | head -1)
          # SDK 1.0+ moved the GNU toolchain into a 'gnu' subdirectory.
          # Fall back to the flat layout for SDK <1.0 compatibility.
          if [ -d "${SDK_DIR}/gnu/arm-zephyr-eabi/bin" ]; then
            ARM_BIN="${SDK_DIR}/gnu/arm-zephyr-eabi"
          else
            ARM_BIN="${SDK_DIR}/arm-zephyr-eabi"
          fi
          GCC="${ARM_BIN}/bin/arm-zephyr-eabi-gcc"
          GCC_LIB_DIR=$(dirname $("${GCC}" -print-libgcc-file-name -mcpu=cortex-m3 -mthumb))
          PICOLIBC_DIR="${ARM_BIN}/arm-zephyr-eabi/lib/thumb/v7-m/nofp"
          echo "LLD_LIBS=-L${GCC_LIB_DIR} -L${PICOLIBC_DIR}" >> "$GITHUB_ENV"
          echo "LIBRARY_PATH=${GCC_LIB_DIR}:${PICOLIBC_DIR}" >> "$GITHUB_ENV"
          echo "${ARM_BIN}/bin" >> "$GITHUB_PATH"

      - name: Build and run test (LLVM+LTO)
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf;${GALE_ROOT}/zephyr/gale_lto_overlay.conf" \
            -DCMAKE_EXE_LINKER_FLAGS="${LLD_LIBS}"
          timeout 120 west build -t run 2>&1 | tee test.log
          if grep -q "PROJECT EXECUTION SUCCESSFUL" test.log; then
            echo "PASS: ${PRIMITIVE}"
          else
            echo "::error::${PRIMITIVE} test failed with LLVM+LTO"
            exit 1
          fi
