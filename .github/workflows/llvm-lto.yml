# LLVM cross-language LTO: build Zephyr+Gale with Clang+lld, enabling
# link-time optimization across C and Rust boundaries.
#
# This workflow validates that Rust FFI functions can be inlined into
# C call sites by the LLVM linker, achieving zero overhead for
# formally verified kernel primitives.

name: LLVM Cross-Language LTO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: llvm-lto-${{ github.ref }}
  cancel-in-progress: true

env:
  HOME: /root
  DOCKER_CONFIG: /tmp/.docker

jobs:
  # =========================================================================
  # Build with LLVM + cross-language LTO and compare sizes against GCC
  # =========================================================================
  llvm-lto-build:
    name: "LLVM LTO build + size comparison"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Install matching LLVM toolchain
        run: |
          # Rust stable uses LLVM 21. Cross-language LTO requires matching
          # LLVM versions between the Rust compiler and the C linker (lld).
          # The Zephyr CI image ships LLVM 18 which is incompatible.
          . /root/.cargo/env
          RUST_LLVM=$(rustc -vV | grep 'LLVM version' | grep -o '[0-9]*' | head -1)
          echo "Rust LLVM major version: ${RUST_LLVM}"
          apt-get update -qq
          apt-get install -y -qq wget lsb-release software-properties-common gnupg > /dev/null 2>&1
          wget -qO- https://apt.llvm.org/llvm.sh | bash -s -- "${RUST_LLVM}" all
          # Use versioned binaries
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/llvm-size llvm-size /usr/bin/llvm-size-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-${RUST_LLVM} 100
          clang --version
          ld.lld --version

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      # --- Build 1: Baseline (GCC, stock Zephyr, no Gale) ---
      - name: "Build baseline (GCC, no Gale)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-gcc-baseline
          arm-zephyr-eabi-size build-gcc-baseline/zephyr/zephyr.elf | tee gcc-baseline-size.txt

      # --- Build 2: GCC + Gale (current default) ---
      - name: "Build GCC + Gale"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-gcc-gale \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          arm-zephyr-eabi-size build-gcc-gale/zephyr/zephyr.elf | tee gcc-gale-size.txt

      # --- Build 3: LLVM + Gale (no LTO) ---
      - name: "Build LLVM + Gale (no LTO)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-llvm-gale \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          llvm-size build-llvm-gale/zephyr/zephyr.elf 2>/dev/null \
            || arm-zephyr-eabi-size build-llvm-gale/zephyr/zephyr.elf \
            | tee llvm-gale-size.txt

      # --- Build 4: LLVM + Gale + cross-language LTO ---
      - name: "Build LLVM + Gale + LTO"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-llvm-lto \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf;${GALE_ROOT}/zephyr/gale_lto_overlay.conf"
          llvm-size build-llvm-lto/zephyr/zephyr.elf 2>/dev/null \
            || arm-zephyr-eabi-size build-llvm-lto/zephyr/zephyr.elf \
            | tee llvm-lto-size.txt

      # --- Run LLVM+LTO tests to confirm correctness ---
      - name: "Run semaphore tests (LLVM+LTO)"
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          cd zephyr-workspace
          timeout 120 west build -d build-llvm-lto -t run 2>&1 | tee test-llvm-lto.log
          if grep -q "PROJECT EXECUTION SUCCESSFUL" test-llvm-lto.log; then
            echo "PASS: LLVM+LTO semaphore tests"
          else
            echo "::error::LLVM+LTO semaphore tests failed"
            exit 1
          fi

      # --- Check for inlining evidence ---
      - name: "Check for Rust function inlining"
        run: |
          cd zephyr-workspace
          echo "=== Symbol check: Rust FFI functions in LLVM+LTO build ==="
          echo ""
          echo "--- GCC+Gale symbols (should have gale_ symbols) ---"
          arm-zephyr-eabi-nm build-gcc-gale/zephyr/zephyr.elf 2>/dev/null \
            | grep -i gale_ | head -20 || echo "(no gale_ symbols found)"
          echo ""
          echo "--- LLVM+LTO symbols (inlined = fewer/no gale_ symbols) ---"
          llvm-nm build-llvm-lto/zephyr/zephyr.elf 2>/dev/null \
            | grep -i gale_ | head -20 \
            || arm-zephyr-eabi-nm build-llvm-lto/zephyr/zephyr.elf 2>/dev/null \
              | grep -i gale_ | head -20 \
            || echo "(no gale_ symbols found - fully inlined)"

      # --- Size comparison table ---
      - name: "Compare sizes"
        run: |
          cd zephyr-workspace
          echo "=== LLVM Cross-Language LTO Size Comparison ==="
          echo ""

          parse_size() {
            tail -1 "$1" | awk '{print $1, $2, $3, $4}'
          }

          read GCC_BL_TEXT GCC_BL_DATA GCC_BL_BSS GCC_BL_TOTAL <<< $(parse_size gcc-baseline-size.txt)
          read GCC_G_TEXT GCC_G_DATA GCC_G_BSS GCC_G_TOTAL <<< $(parse_size gcc-gale-size.txt)
          read LLVM_G_TEXT LLVM_G_DATA LLVM_G_BSS LLVM_G_TOTAL <<< $(parse_size llvm-gale-size.txt)
          read LTO_TEXT LTO_DATA LTO_BSS LTO_TOTAL <<< $(parse_size llvm-lto-size.txt)

          GALE_OVERHEAD=$((GCC_G_TOTAL - GCC_BL_TOTAL))
          LTO_VS_GCC=$((LTO_TOTAL - GCC_G_TOTAL))
          LTO_VS_BASELINE=$((LTO_TOTAL - GCC_BL_TOTAL))

          echo "--- Raw sizes ---"
          printf "%-25s %8s %8s %8s %8s\n" "Build" ".text" ".data" ".bss" "total"
          printf "%-25s %8d %8d %8d %8d\n" "GCC baseline" "$GCC_BL_TEXT" "$GCC_BL_DATA" "$GCC_BL_BSS" "$GCC_BL_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "GCC + Gale" "$GCC_G_TEXT" "$GCC_G_DATA" "$GCC_G_BSS" "$GCC_G_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "LLVM + Gale" "$LLVM_G_TEXT" "$LLVM_G_DATA" "$LLVM_G_BSS" "$LLVM_G_TOTAL"
          printf "%-25s %8d %8d %8d %8d\n" "LLVM + Gale + LTO" "$LTO_TEXT" "$LTO_DATA" "$LTO_BSS" "$LTO_TOTAL"
          echo ""

          echo "--- Analysis ---"
          printf "Gale overhead (GCC):        %+d bytes\n" "$GALE_OVERHEAD"
          printf "LTO savings vs GCC+Gale:    %+d bytes\n" "$LTO_VS_GCC"
          printf "LTO vs baseline (net):      %+d bytes\n" "$LTO_VS_BASELINE"
          echo ""

          if [ "$LTO_VS_BASELINE" -le 0 ]; then
            echo "RESULT: Cross-language LTO achieved ZERO OVERHEAD (or better)!"
          elif [ "$LTO_VS_BASELINE" -lt 100 ]; then
            echo "RESULT: Near-zero overhead ($LTO_VS_BASELINE bytes remaining)."
          else
            echo "RESULT: Some overhead remains ($LTO_VS_BASELINE bytes). Check if Rust functions were inlined."
          fi

          # Write GitHub step summary
          {
            echo "## LLVM Cross-Language LTO Size Comparison"
            echo ""
            echo "Semaphore test suite on qemu_cortex_m3"
            echo ""
            echo "| Build | .text | .data | .bss | total |"
            echo "|-------|-------|-------|------|-------|"
            printf "| GCC baseline | %d | %d | %d | %d |\n" "$GCC_BL_TEXT" "$GCC_BL_DATA" "$GCC_BL_BSS" "$GCC_BL_TOTAL"
            printf "| GCC + Gale | %d | %d | %d | %d |\n" "$GCC_G_TEXT" "$GCC_G_DATA" "$GCC_G_BSS" "$GCC_G_TOTAL"
            printf "| LLVM + Gale | %d | %d | %d | %d |\n" "$LLVM_G_TEXT" "$LLVM_G_DATA" "$LLVM_G_BSS" "$LLVM_G_TOTAL"
            printf "| LLVM + Gale + LTO | %d | %d | %d | %d |\n" "$LTO_TEXT" "$LTO_DATA" "$LTO_BSS" "$LTO_TOTAL"
            echo ""
            printf "| Metric | Bytes |\n"
            printf "|--------|-------|\n"
            printf "| Gale overhead (GCC) | %+d |\n" "$GALE_OVERHEAD"
            printf "| LTO savings vs GCC+Gale | %+d |\n" "$LTO_VS_GCC"
            printf "| Net vs baseline | %+d |\n" "$LTO_VS_BASELINE"
          } >> "$GITHUB_STEP_SUMMARY"

  # =========================================================================
  # Functional test: run core primitives with LLVM+LTO to verify correctness
  # =========================================================================
  llvm-lto-test:
    name: "llvm-lto-test"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - primitive: semaphore
            test_path: tests/kernel/semaphore/semaphore
          - primitive: mutex
            test_path: tests/kernel/mutex/mutex_api
          - primitive: msgq
            test_path: tests/kernel/msgq/msgq_api
          - primitive: stack
            test_path: tests/kernel/stack/stack
          - primitive: pipe
            test_path: tests/kernel/pipe/pipe_api
          - primitive: timer
            test_path: tests/kernel/timer/timer_api
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker
      PRIMITIVE: placeholder
      TEST_PATH: placeholder

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Set matrix env vars
        run: |
          echo "PRIMITIVE=${{ matrix.primitive }}" >> "$GITHUB_ENV"
          echo "TEST_PATH=${{ matrix.test_path }}" >> "$GITHUB_ENV"

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Install matching LLVM toolchain
        run: |
          . /root/.cargo/env
          RUST_LLVM=$(rustc -vV | grep 'LLVM version' | grep -o '[0-9]*' | head -1)
          echo "Rust LLVM major version: ${RUST_LLVM}"
          apt-get update -qq
          apt-get install -y -qq wget lsb-release software-properties-common gnupg > /dev/null 2>&1
          wget -qO- https://apt.llvm.org/llvm.sh | bash -s -- "${RUST_LLVM}" all
          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-${RUST_LLVM} 100
          update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-${RUST_LLVM} 100
          clang --version

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      - name: Build and run test (LLVM+LTO)
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_TOOLCHAIN_VARIANT=llvm \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf;${GALE_ROOT}/zephyr/gale_lto_overlay.conf"
          timeout 120 west build -t run 2>&1 | tee test.log
          if grep -q "PROJECT EXECUTION SUCCESSFUL" test.log; then
            echo "PASS: ${PRIMITIVE}"
          else
            echo "::error::${PRIMITIVE} test failed with LLVM+LTO"
            exit 1
          fi
