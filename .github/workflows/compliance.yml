name: Compliance report

# Publishes gale-<tag>-compliance-report.tar.gz to each GitHub Release so
# pulseengine.eu's fetch-reports surfaces gale's rivet traceability/compliance
# evidence on the Reports page. Mirrors pulseengine/synth's compliance.yml.
#
# Decoupled from release.yml on purpose: triggers on release publish, is
# additive, and cannot affect the release flow if it fails.
#
# NOTE: rivet-version pins the rivet binary used to validate/export gale's
# artifacts. Bumped to v0.22.0 (release-handling: the `release:` field + `rivet
# release status` burn-down, rivet #516). `rivet validate` is PASS on gale's
# artifacts under 0.22.0; bump in lockstep if a future schema needs a newer rivet.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to (re)generate the report for (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  compliance:
    name: Generate compliance report
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        env:
          REL_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$REL_TAG}"
          case "$TAG" in v*) ;; *) echo "::error::tag '$TAG' must start with v"; exit 1 ;; esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Release readiness burn-down (rivet release status)
        # rivet 0.22 release-handling (#516): per-status burn-down of the artifacts
        # scoped to `release: <tag>`. Non-blocking: gale's V-model marks artifacts
        # verified via `verified-by` LINKS (validated below), not a `verified`
        # STATUS, so rivet's status-only cuttability verdict always reads
        # "not cuttable" for gale — tracked in pulseengine/rivet#612. The
        # blocking V-gate is `rivet validate` inside the compliance action.
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          d=$(mktemp -d)
          gh release download v0.22.0 --repo pulseengine/rivet \
            -p '*x86_64-unknown-linux-gnu*' -D "$d" 2>/dev/null || true
          tar xzf "$d"/*x86_64-unknown-linux-gnu*.tar.gz -C "$d" 2>/dev/null || true
          RV=$(find "$d" -name rivet -type f | head -1); chmod +x "$RV" 2>/dev/null || true
          echo "## Release readiness — \`$TAG\` (rivet release status)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          "$RV" release status "$TAG" >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "_Burn-down is advisory; cuttability verdict pending rivet#612 (link-based V verification). Blocking gate = rivet validate._" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate compliance report
        id: report
        uses: pulseengine/rivet/.github/actions/compliance@v0.22.0
        with:
          theme: dark
          rivet-version: v0.22.0
          include-data-formats: true
          report-label: ${{ steps.tag.outputs.tag }}
          archive: 'true'
          archive-name: gale-${{ steps.tag.outputs.tag }}-compliance-report

      - name: Upload report to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCHIVE_PATH: ${{ steps.report.outputs.archive-path }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${ARCHIVE_PATH:-}" ] || [ ! -f "$ARCHIVE_PATH" ]; then
            echo "::error::compliance action produced no archive-path"; exit 1
          fi
          gh release upload "$TAG" "$ARCHIVE_PATH" --clobber
          echo "::notice title=Compliance report::uploaded $(basename "$ARCHIVE_PATH")"
