# Zephyr kernel integration tests with Gale enabled
#
# Builds and runs upstream Zephyr test suites for each kernel primitive
# replaced by Gale, on qemu_cortex_m3.
#
# Uses the Zephyr CI Docker image which has the Zephyr SDK pre-installed.

name: Zephyr Kernel Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: zephyr-${{ github.ref }}
  cancel-in-progress: true

env:
  HOME: /root
  DOCKER_CONFIG: /tmp/.docker

jobs:
  zephyr-test:
    name: "${{ matrix.primitive }} (qemu_cortex_m3)"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - primitive: semaphore
            test_path: tests/kernel/semaphore/semaphore
          - primitive: mutex
            test_path: tests/kernel/mutex/mutex_api
          - primitive: condvar
            test_path: tests/kernel/condvar/condvar_api
          - primitive: msgq
            test_path: tests/kernel/msgq/msgq_api
          - primitive: stack
            test_path: tests/kernel/stack/stack
          - primitive: pipe
            test_path: tests/kernel/pipe/pipe_api
          - primitive: timer
            test_path: tests/kernel/timer/timer_api
          - primitive: event
            test_path: tests/kernel/events/event_api
          - primitive: mem_slab
            test_path: tests/kernel/mem_slab/mslab
          - primitive: fifo
            test_path: tests/kernel/fifo/fifo_api
          - primitive: lifo
            test_path: tests/kernel/lifo/lifo_api
          - primitive: queue
            test_path: tests/kernel/queue
          - primitive: mbox
            test_path: tests/kernel/mbox/mbox_api
          # --- Phase 3 modules (timeout, poll, timeslice, kheap, work, sched, thread_lifecycle) ---
          # timeout: excluded — Phase 3 timeout shim does not fully replace timeout.c
          # poll: excluded — Phase 3 poll shim has integration gaps with event loop
          # work: excluded — Phase 3 work shim flag state machine has edge cases
          - primitive: timeslice
            test_path: tests/kernel/sched/schedule_api
          - primitive: kheap
            test_path: tests/kernel/mem_heap/k_heap_api
          - primitive: sched
            test_path: tests/kernel/sched/preempt
          - primitive: thread_lifecycle
            test_path: tests/kernel/threads/thread_apis

          # --- Extended test coverage: additional suites for deeper regression testing ---

          # Mutex variants
          - primitive: sys_mutex
            test_path: tests/kernel/mutex/sys_mutex

          # sys_sem: excluded — test_multiple_thread_sem_usage timing-sensitive on M3

          # Message queue depth
          - primitive: msgq_usage
            test_path: tests/kernel/msgq/msgq_usage

          # FIFO depth
          # fifo_timeout: excluded — depends on Phase 3 timeout shim integration.
          # Core fifo tests pass in fifo_api suite above.
          - primitive: fifo_usage
            test_path: tests/kernel/fifo/fifo_usage

          # LIFO depth
          - primitive: lifo_usage
            test_path: tests/kernel/lifo/lifo_usage

          # Mailbox depth
          - primitive: mbox_usage
            test_path: tests/kernel/mbox/mbox_usage

          # Memory slab depth
          - primitive: mslab_api
            test_path: tests/kernel/mem_slab/mslab_api
          - primitive: mslab_concept
            test_path: tests/kernel/mem_slab/mslab_concept
          - primitive: mslab_threadsafe
            test_path: tests/kernel/mem_slab/mslab_threadsafe

          # Event variants
          - primitive: sys_event
            test_path: tests/kernel/events/sys_event

          # Scheduler depth
          - primitive: sched_deadline
            test_path: tests/kernel/sched/deadline
          - primitive: sched_metairq
            test_path: tests/kernel/sched/metairq

          # Thread depth
          - primitive: thread_init
            test_path: tests/kernel/threads/thread_init

          # Core kernel tests
          - primitive: pending
            test_path: tests/kernel/pending
          - primitive: sleep
            test_path: tests/kernel/sleep
          - primitive: context
            test_path: tests/kernel/context
          - primitive: common
            test_path: tests/kernel/common

          # Tests requiring MPU run on mps2/an385 job below.
          # SMP tests need multi-core board (not available in QEMU).

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      - name: Build and run test
        env:
          TEST_PATH: ${{ matrix.test_path }}
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          timeout 120 west build -t run 2>&1 | tee test.log
          if grep -q "PROJECT EXECUTION SUCCESSFUL" test.log; then
            echo "PASS"
          else
            echo "::error::Test suite failed"
            exit 1
          fi

  # =========================================================================
  # MPU tests — run on mps2/an385 (Cortex-M3 with MPU, QEMU)
  # These tests require CONFIG_ARCH_HAS_USERSPACE / MPU which
  # qemu_cortex_m3 does not provide.
  # =========================================================================
  zephyr-mpu-test:
    name: "${{ matrix.primitive }} (mps2/an385)"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - primitive: mutex_error_case
            test_path: tests/kernel/mutex/mutex_error_case
          - primitive: futex
            test_path: tests/kernel/mem_protect/futex
          - primitive: stackprot
            test_path: tests/kernel/mem_protect/stackprot
          - primitive: syscalls
            test_path: tests/kernel/mem_protect/syscalls
          - primitive: fatal_exception
            test_path: tests/kernel/fatal/exception
          # Excluded — Phase 3 sched/thread_lifecycle/dynamic shim interactions:
          # mem_protect, userspace, obj_validation

    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      - name: Build and run test
        env:
          TEST_PATH: ${{ matrix.test_path }}
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b mps2/an385 \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          timeout 120 west build -t run 2>&1 | tee test.log
          if grep -q "PROJECT EXECUTION SUCCESSFUL" test.log; then
            echo "PASS"
          else
            echo "::error::Test suite failed"
            exit 1
          fi

  # =========================================================================
  # Binary size comparison — baseline vs Gale for the semaphore test suite
  # =========================================================================
  size-comparison:
    name: "Binary size comparison"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add thumbv7m-none-eabi

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      - name: Build baseline (stock Zephyr)
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-baseline
          arm-zephyr-eabi-size build-baseline/zephyr/zephyr.elf | tee baseline-size.txt

      - name: Build with Gale
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b qemu_cortex_m3 \
            -s zephyr/tests/kernel/semaphore/semaphore \
            -d build-gale \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"
          arm-zephyr-eabi-size build-gale/zephyr/zephyr.elf | tee gale-size.txt

      - name: Compare sizes
        run: |
          echo "=== Binary Size Comparison ==="
          echo ""
          echo "--- Baseline (stock Zephyr) ---"
          cat zephyr-workspace/baseline-size.txt
          echo ""
          echo "--- With Gale ---"
          cat zephyr-workspace/gale-size.txt
          echo ""

          BASELINE_TEXT=$(tail -1 zephyr-workspace/baseline-size.txt | awk '{print $1}')
          BASELINE_DATA=$(tail -1 zephyr-workspace/baseline-size.txt | awk '{print $2}')
          BASELINE_BSS=$(tail -1 zephyr-workspace/baseline-size.txt | awk '{print $3}')
          BASELINE_TOTAL=$(tail -1 zephyr-workspace/baseline-size.txt | awk '{print $4}')

          GALE_TEXT=$(tail -1 zephyr-workspace/gale-size.txt | awk '{print $1}')
          GALE_DATA=$(tail -1 zephyr-workspace/gale-size.txt | awk '{print $2}')
          GALE_BSS=$(tail -1 zephyr-workspace/gale-size.txt | awk '{print $3}')
          GALE_TOTAL=$(tail -1 zephyr-workspace/gale-size.txt | awk '{print $4}')

          DELTA_TEXT=$((GALE_TEXT - BASELINE_TEXT))
          DELTA_DATA=$((GALE_DATA - BASELINE_DATA))
          DELTA_BSS=$((GALE_BSS - BASELINE_BSS))
          DELTA_TOTAL=$((GALE_TOTAL - BASELINE_TOTAL))

          echo "--- Delta (Gale - Baseline) ---"
          printf "  .text:  %+d bytes\n" "$DELTA_TEXT"
          printf "  .data:  %+d bytes\n" "$DELTA_DATA"
          printf "  .bss:   %+d bytes\n" "$DELTA_BSS"
          printf "  total:  %+d bytes\n" "$DELTA_TOTAL"
          echo ""

          # Write summary to GitHub step summary
          {
            echo "## Binary Size Comparison (semaphore test)"
            echo ""
            echo "| Section | Baseline | Gale | Delta |"
            echo "|---------|----------|------|-------|"
            printf "| .text | %d | %d | %+d |\n" "$BASELINE_TEXT" "$GALE_TEXT" "$DELTA_TEXT"
            printf "| .data | %d | %d | %+d |\n" "$BASELINE_DATA" "$GALE_DATA" "$DELTA_DATA"
            printf "| .bss | %d | %d | %+d |\n" "$BASELINE_BSS" "$GALE_BSS" "$DELTA_BSS"
            printf "| **total** | **%d** | **%d** | **%+d** |\n" "$BASELINE_TOTAL" "$GALE_TOTAL" "$DELTA_TOTAL"
          } >> "$GITHUB_STEP_SUMMARY"

          # Emit bencher-format output for tracking over time
          {
            printf "gale_overhead_text %d ns/iter (+/- 0)\n" "$DELTA_TEXT"
            printf "gale_overhead_total %d ns/iter (+/- 0)\n" "$DELTA_TOTAL"
            printf "gale_flash_bytes %d ns/iter (+/- 0)\n" "$GALE_TOTAL"
            printf "baseline_flash_bytes %d ns/iter (+/- 0)\n" "$BASELINE_TOTAL"
          } > zephyr-workspace/benchmark-output.txt

          # Fail if total overhead exceeds 10% (SYSREQ-PERF-001)
          PERCENT=$((DELTA_TOTAL * 100 / BASELINE_TOTAL))
          echo "Overhead: ${PERCENT}%"
          if [ "$PERCENT" -gt 10 ]; then
            echo "::error::Binary size overhead ${PERCENT}% exceeds 10% threshold (SYSREQ-PERF-001)"
            exit 1
          fi

      - name: Track binary size over time
        if: always()
        continue-on-error: true
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Binary Size (semaphore test, qemu_cortex_m3)
          tool: cargo
          output-file-path: zephyr-workspace/benchmark-output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-threshold: "110%"
          fail-on-alert: false
          max-items-in-chart: 50
          save-data-file: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
