# Formal verification CI — Verus (SMT/Z3)
#
# Runs Verus verification via Bazel. rules_verus downloads
# the Verus binary automatically — no Nix needed.
#
# Rocq and Lean require Nix for their toolchains and are
# excluded until a flake.nix is added to the project.

name: Formal Verification

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'ffi/**'
      - 'BUILD.bazel'
      - 'MODULE.bazel'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'ffi/**'
  schedule:
    - cron: '0 2 * * 0'

concurrency:
  group: formal-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verus:
    name: Verus SMT (39 modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run Verus verification
        run: |
          bazel test //:verus_test --test_output=errors
        timeout-minutes: 30
