# Engine-control benchmark — Renode long run (cycle-accurate).
#
# This workflow produces the AUTHORITATIVE absolute-timing numbers
# for the engine-control benchmark. Renode's cycle-accurate model of
# stm32f4_disco (Cortex-M4F @ 168 MHz) reports latencies that match
# real-hardware timing (within documented model fidelity), unlike
# QEMU's fake 12 MHz counter.
#
# Sample count: 10,000 per build (vs 150 in the QEMU smoke). At
# 60 kHz interrupt peak and Renode's ~0.3x realtime speed, one
# complete sweep takes ~15–25 min per build, ~40 min total for both.
#
# Triggered:
#   - workflow_dispatch (manual, e.g. before a release)
#   - weekly cron (Sunday 02:00 UTC)
# NOT on push or PR — too slow for per-commit feedback; that's what
# engine-bench-smoke.yml is for.
#
# Artifacts:
#   - engine-bench-renode-long: baseline + gale CSVs, Robot logs, report
#
# Security: no untrusted github.event.* inputs are shell-interpolated.
# Only github.workspace (filesystem path) and github.ref (concurrency
# key identifier) are referenced.

name: Engine bench long (Renode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

concurrency:
  group: engine-bench-renode-${{ github.ref }}
  cancel-in-progress: false

# Container default shell is dash; use bash so { ...; } >> file and
# other brace-group / array patterns work reliably across scripts.
defaults:
  run:
    shell: bash

jobs:
  long-run:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    env:
      HOME: /root
      DOCKER_CONFIG: /tmp/.docker
    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + ARM target
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          # stm32f4_disco uses a Cortex-M4F — gale's CMake picks
          # thumbv7em-none-eabihf when CONFIG_FPU=y, otherwise the
          # soft-float thumbv7em-none-eabi. The engine bench doesn't
          # use floating point so CONFIG_FPU stays off by default and
          # the soft-float target is what cargo ends up needing.
          # Install both so either config works.
          rustup target add thumbv7em-none-eabi
          rustup target add thumbv7em-none-eabihf

      - name: West init + update + SDK
        run: |
          pip3 install west robotframework
          west init -m https://github.com/pulseengine/zephyr.git \
            --mr gale/sem-replacement zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          for attempt in 1 2 3; do
            west sdk install -t arm-zephyr-eabi && break || sleep 5
          done

      - name: Setup SDK paths
        run: |
          SDK_DIR=$(find /root -maxdepth 1 -name 'zephyr-sdk-*' -type d | head -1)
          [ -z "${SDK_DIR}" ] && SDK_DIR=$(find /opt -maxdepth 2 -name 'zephyr-sdk-*' -type d | head -1)
          if [ -d "${SDK_DIR}/gnu/arm-zephyr-eabi/bin" ]; then
            echo "${SDK_DIR}/gnu/arm-zephyr-eabi/bin" >> "$GITHUB_PATH"
          else
            echo "${SDK_DIR}/arm-zephyr-eabi/bin" >> "$GITHUB_PATH"
          fi
          echo "ZEPHYR_SDK_INSTALL_DIR=${SDK_DIR}" >> "$GITHUB_ENV"

      - name: Build baseline (stm32f4_disco, long sweep, 10k samples)
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr-workspace/zephyr
          GALE_ROOT:   ${{ github.workspace }}/gale
        run: |
          . /root/.cargo/env
          west build -b stm32f4_disco -d /tmp/engine-baseline-long \
            -s "$GALE_ROOT/benches/engine_control" \
            -- \
              -DENGINE_BENCH_SWEEP=long

      - name: Build gale (stm32f4_disco, long sweep, 10k samples)
        env:
          ZEPHYR_BASE: ${{ github.workspace }}/zephyr-workspace/zephyr
          GALE_ROOT:   ${{ github.workspace }}/gale
        run: |
          . /root/.cargo/env
          west build -b stm32f4_disco -d /tmp/engine-gale-long \
            -s "$GALE_ROOT/benches/engine_control" \
            -- \
              -DZEPHYR_EXTRA_MODULES="$GALE_ROOT" \
              -DOVERLAY_CONFIG="$GALE_ROOT/benches/engine_control/prj-gale.conf" \
              -DENGINE_BENCH_SWEEP=long

      - name: Run baseline in Renode
        env:
          ELF:           /tmp/engine-baseline-long/zephyr/zephyr.elf
          BENCH_CSV_OUT: /tmp/engine-baseline-long/output.csv
          GALE_ROOT:     ${{ github.workspace }}/gale
        # Use $GITHUB_WORKSPACE as the cwd base (matches renode-tests.yml)
        # — /tmp paths tripped robot-framework's `abspath('.')` call on
        # container startup in an earlier attempt.
        run: |
          mkdir -p "$GITHUB_WORKSPACE/renode-baseline"
          cd "$GITHUB_WORKSPACE/renode-baseline"
          renode-test "$GALE_ROOT/benches/engine_control/renode/engine_stm32f4.robot"

      - name: Run gale in Renode
        env:
          ELF:           /tmp/engine-gale-long/zephyr/zephyr.elf
          BENCH_CSV_OUT: /tmp/engine-gale-long/output.csv
          GALE_ROOT:     ${{ github.workspace }}/gale
        run: |
          mkdir -p "$GITHUB_WORKSPACE/renode-gale"
          cd "$GITHUB_WORKSPACE/renode-gale"
          renode-test "$GALE_ROOT/benches/engine_control/renode/engine_stm32f4.robot"

      - name: Tag events with run-id for analyzer
        env:
          GALE_ROOT: ${{ github.workspace }}/gale
        run: |
          # The Renode robot writes a raw UART capture to output.csv.
          # analyze.py expects per-line run-id + variant tags (the same
          # format run_qemu_bench.sh produces). We apply that here so
          # Renode and QEMU lanes share one analyzer.
          python3 - <<'PY' \
              /tmp/engine-baseline-long/output.csv baseline \
              > /tmp/engine-baseline-long/events.csv
          import sys
          raw_path, variant = sys.argv[1], sys.argv[2]
          with open(raw_path, 'rt', errors='replace') as f:
              for line in f:
                  line = line.rstrip('\r\n')
                  if line.startswith('E,'):
                      print(f"R1,{variant},{line}")
                  elif line.startswith(('drops,', 'samples,', 'build,',
                                        'cycles_per_sec,', 'target_samples,')):
                      print(f"M,R1,{variant},{line}")
                  elif line == '=== END ===':
                      print(f"M,R1,{variant},END")
          PY
          python3 - <<'PY' \
              /tmp/engine-gale-long/output.csv gale \
              > /tmp/engine-gale-long/events.csv
          import sys
          raw_path, variant = sys.argv[1], sys.argv[2]
          with open(raw_path, 'rt', errors='replace') as f:
              for line in f:
                  line = line.rstrip('\r\n')
                  if line.startswith('E,'):
                      print(f"R1,{variant},{line}")
                  elif line.startswith(('drops,', 'samples,', 'build,',
                                        'cycles_per_sec,', 'target_samples,')):
                      print(f"M,R1,{variant},{line}")
                  elif line == '=== END ===':
                      print(f"M,R1,{variant},END")
          PY

      - name: Render comparison report
        env:
          GALE_ROOT: ${{ github.workspace }}/gale
        run: |
          python3 "$GALE_ROOT/benches/engine_control/analyze.py" \
            --baseline /tmp/engine-baseline-long/events.csv \
            --gale     /tmp/engine-gale-long/events.csv \
            --runs 1 \
            > /tmp/engine-comparison.md || true
          {
            echo '## Engine bench long (Renode) — this run'
            cat /tmp/engine-comparison.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload event streams + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-bench-renode-long
          path: |
            /tmp/engine-baseline-long/output.csv
            /tmp/engine-gale-long/output.csv
            /tmp/engine-baseline-long/events.csv
            /tmp/engine-gale-long/events.csv
            renode-baseline/
            renode-gale/
            /tmp/engine-comparison.md
          if-no-files-found: ignore
