# Sanitizer matrix — ASan / TSan / LSan under nightly Rust
#
# Runs cargo test with -Zsanitizer=address|thread|leak on the host target.
# LSan is bundled with ASan on Linux; we exercise it explicitly via a
# dedicated leak-check run so it's visible as its own CI signal.
#
# Paired with .cargo/config.toml, which already wires the rustflags via
# cfg(sanitizer = "...") for local reproduction.

name: Sanitizers

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'plain/**'
      - 'ffi/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/sanitizers.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'plain/**'
      - 'ffi/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.cargo/config.toml'
      - '.github/workflows/sanitizers.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  sanitize:
    name: "${{ matrix.sanitizer }} (rust-cpu)"
    # thread runs on a GitHub-hosted runner: the self-hosted rust-cpu
    # containers block personality(2) via seccomp AND have no passwordless
    # sudo, so neither the vm.mmap_rnd_bits sysctl nor a setarch -R
    # fallback can satisfy TSan's shadow-layout requirement there. On
    # GitHub-hosted runners the sysctl works.
    runs-on: ${{ fromJSON(matrix.runner) }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: address
            runner: '["self-hosted", "linux", "x64", "rust-cpu"]'
          - sanitizer: thread
            runner: '"ubuntu-24.04"'
          - sanitizer: leak
            runner: '["self-hosted", "linux", "x64", "rust-cpu"]'
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly Rust + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: san-${{ matrix.sanitizer }}-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: san-${{ matrix.sanitizer }}-${{ runner.os }}-

      - name: Resolve host target
        id: host
        run: |
          HOST=$(rustc -vV | awk '/^host:/ {print $2}')
          echo "target=${HOST}" >> "$GITHUB_OUTPUT"
          echo "Host target: ${HOST}"

      - name: Lower mmap randomization entropy for TSan
        if: matrix.sanitizer == 'thread'
        run: |
          # TSan's shadow memory layout is incompatible with the 32-bit
          # mmap_rnd_bits newer kernels default to — it aborts at startup
          # with "FATAL: ThreadSanitizer: memory layout is incompatible,
          # even though ASLR is disabled". 28 bits is the documented
          # workaround (same one rustc CI uses). The thread lane runs on
          # GitHub-hosted runners (see runs-on) where this sysctl works.
          sudo sysctl -w vm.mmap_rnd_bits=28

      - name: cargo test with -Zsanitizer=${{ matrix.sanitizer }}
        env:
          SAN: ${{ matrix.sanitizer }}
          TARGET: ${{ steps.host.outputs.target }}
          RUSTFLAGS: "-Zsanitizer=${{ matrix.sanitizer }} -Cdebuginfo=1"
          RUSTDOCFLAGS: "-Zsanitizer=${{ matrix.sanitizer }}"
          ASAN_OPTIONS: "detect_leaks=0:abort_on_error=1:strict_string_checks=1:detect_stack_use_after_return=1"
          TSAN_OPTIONS: "halt_on_error=1:history_size=7"
          LSAN_OPTIONS: "exitcode=23"
        run: |
          mkdir -p sanitizer-logs
          set -o pipefail
          if [ "${SAN}" = "leak" ]; then
            ASAN_OPTIONS="detect_leaks=1:abort_on_error=0" \
              cargo +nightly test --workspace \
                -Z build-std \
                --target "${TARGET}" \
                --tests 2>&1 | tee "sanitizer-logs/${SAN}.log"
          else
            cargo +nightly test --workspace \
              -Z build-std \
              --target "${TARGET}" \
              --tests 2>&1 | tee "sanitizer-logs/${SAN}.log"
          fi

      - name: Upload sanitizer log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-${{ matrix.sanitizer }}-log
          path: sanitizer-logs/
          retention-days: 14
