# Multi-architecture build verification
#
# Builds Zephyr+Gale semaphore test for M4F, M33, and R5 targets.
# Proves the Rust FFI cross-compiles correctly for each architecture.
# Renode emulation tests will be added once renode-bazel-rules is wired in.

name: Multi-Arch Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HOME: /root
  DOCKER_CONFIG: /tmp/.docker

jobs:
  build:
    name: "${{ matrix.arch }} (${{ matrix.board }})"
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.29.0
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: mps2/an385
            arch: cortex-m3
            rust_target: thumbv7m-none-eabi
            test_path: tests/kernel/semaphore/semaphore
          - board: mps2/an386
            arch: cortex-m4
            rust_target: thumbv7em-none-eabi
            test_path: tests/kernel/semaphore/semaphore
          - board: mps2/an521
            arch: cortex-m33
            rust_target: thumbv8m.main-none-eabihf
            test_path: tests/kernel/semaphore/semaphore

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v4
        with:
          path: gale

      - name: Install Rust + target
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add "${RUST_TARGET}"

      - name: Initialize west workspace
        run: |
          pip3 install west
          west init -m https://github.com/zephyrproject-rtos/zephyr.git zephyr-workspace
          cd zephyr-workspace
          west update --narrow -o=--depth=1
          west sdk install

      - name: Build semaphore test
        env:
          BOARD: ${{ matrix.board }}
          TEST_PATH: ${{ matrix.test_path }}
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="${GITHUB_WORKSPACE}/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd zephyr-workspace
          west build -b "${BOARD}" \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"

      - name: Upload ELF
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "elf-${{ matrix.arch }}"
          path: zephyr-workspace/build/zephyr/zephyr.elf
          retention-days: 7
