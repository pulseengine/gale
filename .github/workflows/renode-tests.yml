# Renode emulation tests for Gale on M4F, M33, and R5 architectures
#
# Builds Zephyr+Gale semaphore test for each board with west, then runs
# the Renode Robot Framework tests to verify correct execution on the
# emulated hardware.  Complements zephyr-tests.yml (which uses QEMU M3)
# by covering M4F (STM32F4), M33 (STM32L552), and R5 (ZynqMP RPU) emulation.
#
# Renode portable handles its own .NET runtime — no system deps needed.

name: Renode Emulation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  HOME: /root
  DOCKER_CONFIG: /tmp/.docker
  # ENOSPC durable fix (gale#73): the ci-base image fills most of the host root,
  # so the west workspace, the Zephyr SDK extract, the rustup toolchains, and the
  # SDK download temp must all land on the big ephemeral /mnt disk (mounted via
  # the container --volume below), not /root or the container's / overlay.
  RUSTUP_HOME: /mnt/.rustup

jobs:
  renode-test:
    name: "${{ matrix.arch }} (${{ matrix.board }})"
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    container:
      image: ghcr.io/zephyrproject-rtos/ci-base:v0.29.0
      options: --user root --volume /mnt:/mnt
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: stm32f4_disco
            arch: cortex-m4f
            rust_target: thumbv7em-none-eabihf
            test_path: tests/kernel/semaphore/semaphore
            robot_file: stm32f4_sem.robot

          - board: nucleo_l552ze_q
            arch: cortex-m33
            rust_target: thumbv8m.main-none-eabihf
            test_path: tests/kernel/semaphore/semaphore
            robot_file: stm32l552_sem.robot

          - board: qemu_cortex_r5
            arch: cortex-r5
            rust_target: armv7r-none-eabihf
            test_path: tests/kernel/semaphore/semaphore
            robot_file: zynqmp_r5_sem.robot

    steps:
      - name: Checkout Gale
        uses: actions/checkout@v6
        with:
          path: gale

      - name: Install Rust + target
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
        run: |
          apt-get update -qq && apt-get install -y -qq curl > /dev/null 2>&1
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          . /root/.cargo/env
          rustup target add "${RUST_TARGET}"
          # Install non-hf variant in case the board uses soft-float ABI
          NON_HF=$(echo "${RUST_TARGET}" | sed 's/eabihf$/eabi/')
          if [ "${NON_HF}" != "${RUST_TARGET}" ]; then
            rustup target add "${NON_HF}" || true
          fi

      - name: Initialize west workspace
        run: |
          pip3 install west
          echo "host-root before reclaim:"; df -h / | tail -1
          rm -rf /opt/toolchains/zephyr-sdk-* 2>/dev/null || true   # reclaim ~14GB: image SDK 1.0.0 is unused (build uses our 1.0.1 on /mnt)
          echo "host-root after reclaim:"; df -h / | tail -1
          mkdir -p /mnt/tmp   # TMPDIR (SDK download temp) on the big disk
          export TMPDIR=/mnt/tmp   # SDK download temp on the big disk (after mkdir)
          west init -m https://github.com/pulseengine/zephyr.git --mr gale/sem-replacement /mnt/zephyr-workspace
          cd /mnt/zephyr-workspace
          west update --narrow -o=--depth=1
          for attempt in 1 2 3; do west sdk install --install-base /mnt -t arm-zephyr-eabi && break || sleep 5; done

      - name: Build Zephyr+Gale ELF
        env:
          BOARD: ${{ matrix.board }}
          TEST_PATH: ${{ matrix.test_path }}
        run: |
          . /root/.cargo/env
          export ZEPHYR_BASE="/mnt/zephyr-workspace/zephyr"
          export GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          cd /mnt/zephyr-workspace
          west build -b "${BOARD}" \
            -s "zephyr/${TEST_PATH}" \
            -- \
            -DZEPHYR_EXTRA_MODULES="${GALE_ROOT}" \
            -DOVERLAY_CONFIG="${GALE_ROOT}/zephyr/gale_overlay.conf"

      - name: Install Robot Framework
        run: |
          # The Zephyr CI Docker image (ci:v0.29.0) includes Renode pre-installed
          # at /opt/renode (already in PATH). Just install Robot Framework.
          pip3 install robotframework

      - name: Run Renode test
        env:
          ROBOT_FILE: ${{ matrix.robot_file }}
          ELF: /mnt/zephyr-workspace/build/zephyr/zephyr.elf
        run: |
          GALE_ROOT="${GITHUB_WORKSPACE}/gale"
          mkdir -p "${GITHUB_WORKSPACE}/renode-results"
          cd "${GITHUB_WORKSPACE}/renode-results"
          renode-test "${GALE_ROOT}/renode/${ROBOT_FILE}"

      - name: Upload Renode results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "renode-results-${{ matrix.arch }}"
          path: renode-results/
          retention-days: 7

      - name: Upload ELF
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: "elf-${{ matrix.arch }}"
          path: /mnt/zephyr-workspace/build/zephyr/zephyr.elf
          retention-days: 7
